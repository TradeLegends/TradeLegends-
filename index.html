    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s ease, color 0.2s ease; margin: 0; overflow-x: hidden; }
        
        /* LOADING SCREEN STYLES με fade background */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/S7cgyHJ2/fcd9ca6e-d05e-497c-90a6-c833528f92d4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            backdrop-filter: brightness(0.7) blur(2px);
        }
        .loading-screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 31, 0.65);
            z-index: 1;
        }
        .loading-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: pulseGlow 1.5s infinite ease-in-out;
        }
        .loading-logo {
            width: 180px;
            height: auto;
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.4);
            animation: floatLogo 2s infinite alternate;
        }
        .loading-text {
            margin-top: 24px;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f7931a, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .loading-dots span {
            display: inline-block;
            animation: dotBlink 1.4s infinite;
            font-size: 2rem;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes pulseGlow {
            0% { transform: scale(0.98); opacity: 0.8; text-shadow: 0 0 0px #f7931a; }
            100% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 20px #f7931a; }
        }
        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        @keyframes dotBlink {
            0%, 20% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        
        /* rest of existing styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .package-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .package-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.3);
        }
        .btn-glow { transition: all 0.2s; }
        .btn-glow:hover { filter: brightness(1.05); box-shadow: 0 0 12px currentColor; }
        .hero-gradient { background: radial-gradient(circle at 10% 30%, rgba(0,255,255,0.08) 0%, rgba(0,0,0,0) 60%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #f0b90b; border-radius: 10px; }
    </style>
</head>

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        function applyTheme(settings) {
            if (!settings) return;
            document.documentElement.style.setProperty('--primary-color', settings.primaryColor);
            document.body.style.backgroundColor = settings.backgroundColor;
            document.body.style.color = settings.textColor;
            let meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', settings.primaryColor);
            else {
                const m = document.createElement('meta');
                m.name = "theme-color";
                m.content = settings.primaryColor;
                document.head.appendChild(m);
            }
        }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                applyTheme(siteSettings);
                renderCurrentView();
            });
            
            if (packagesUnsubscribe) packagesUnsubscribe();
            const q = query(collection(db, "packages"), orderBy("order", "asc"));
            packagesUnsubscribe = onSnapshot(q, (snapshot) => {
                packagesList = [];
                snapshot.forEach(doc => packagesList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
