<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TradeLegends | Crypto Education Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s ease, color 0.2s ease; }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .package-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .package-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.3);
        }
        .btn-glow { transition: all 0.2s; }
        .btn-glow:hover { filter: brightness(1.05); box-shadow: 0 0 12px currentColor; }
        .hero-gradient { background: radial-gradient(circle at 10% 30%, rgba(0,255,255,0.08) 0%, rgba(0,0,0,0) 60%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #f0b90b; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-200 overflow-x-hidden">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxtXsrp9kk0nHfuw53CQ-KUqVYukyRZqM",
            authDomain: "tradelegends-ee76e.firebaseapp.com",
            projectId: "tradelegends-ee76e",
            storageBucket: "tradelegends-ee76e.firebasestorage.app",
            messagingSenderId: "70719513507",
            appId: "1:70719513507:web:f9e6edb7cbedfe0a2c7016"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentMode = 'user';
        let adminAuthorized = false;
        let currentAdminUser = null;
        let settingsUnsubscribe = null;
        let packagesUnsubscribe = null;
        
        let siteSettings = {
            primaryColor: '#f7931a',
            backgroundColor: '#0a0a1f',
            textColor: '#f0f0f0',
            heroTitle: 'Master Crypto & Financial Markets',
            heroSubtitle: 'Learn to trade like a legend with expert-led courses and real market insights.',
            heroImageUrl: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?q=80&w=2070&auto=format',
            logoUrl: 'https://cdn-icons-png.flaticon.com/512/4664/4664838.png',
            footerText: '© 2025 TradeLegends — Empowering Financial Freedom'
        };
        let packagesList = [];

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        function applyTheme(settings) {
            if (!settings) return;
            document.documentElement.style.setProperty('--primary-color', settings.primaryColor);
            document.body.style.backgroundColor = settings.backgroundColor;
            document.body.style.color = settings.textColor;
            let meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', settings.primaryColor);
            else {
                const m = document.createElement('meta');
                m.name = "theme-color";
                m.content = settings.primaryColor;
                document.head.appendChild(m);
            }
        }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                applyTheme(siteSettings);
                renderCurrentView();
            });
            
            if (packagesUnsubscribe) packagesUnsubscribe();
            const q = query(collection(db, "packages"), orderBy("order", "asc"));
            packagesUnsubscribe = onSnapshot(q, (snapshot) => {
                packagesList = [];
                snapshot.forEach(doc => packagesList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
        }

        // USER VIEW (unchanged)
        function renderUserView() {
            const primary = siteSettings.primaryColor || '#f7931a';
            const bgColor = siteSettings.backgroundColor || '#0a0a1f';
            const heroImg = siteSettings.heroImageUrl;
            const logoUrl = siteSettings.logoUrl;
            const packagesHtml = packagesList.map(pkg => `
                <div class="package-card glass-card p-6 rounded-2xl flex flex-col" style="background: rgba(0,0,0,0.45); backdrop-filter: blur(10px); border-left: 4px solid ${primary};">
                    ${pkg.imageUrl ? `<img src="${pkg.imageUrl}" class="w-full h-44 object-cover rounded-xl mb-4">` : `<div class="w-full h-44 bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl mb-4 flex items-center justify-center"><i class="fas fa-coins text-4xl opacity-60" style="color:${primary}"></i></div>`}
                    <h3 class="text-2xl font-bold mb-2">${escapeHtml(pkg.name)}</h3>
                    <p class="text-gray-300 text-sm mb-3 flex-grow">${escapeHtml(pkg.description || 'Πλήρες εκπαιδευτικό πακέτο για κρύπτο.')}</p>
                    <div class="flex items-baseline gap-2 mb-3">
                        <span class="text-3xl font-black" style="color:${primary}">${escapeHtml(pkg.price || '€199')}</span>
                        <span class="text-sm text-gray-400">one-time</span>
                    </div>
                    <div class="mb-4 text-xs text-gray-300">
                        ${pkg.features ? (Array.isArray(pkg.features) ? pkg.features.map(f => `<span class="inline-block mr-2"><i class="fas fa-check-circle" style="color:${primary}"></i> ${escapeHtml(f)}</span>`).join('') : `<i class="fas fa-check-circle"></i> ${escapeHtml(pkg.features)}`) : '<i class="fas fa-chart-line"></i> 24/7 access, quizzes'}
                    </div>
                    <button onclick="window.selectPackage('${pkg.id}', '${escapeHtml(pkg.name).replace(/'/g, "\\'")}')" class="mt-3 py-2 px-4 rounded-full font-bold btn-glow" style="background:${primary}; color:#fff;">Επιλέξτε Πακέτο <i class="fas fa-arrow-right ml-1"></i></button>
                </div>
            `).join('');
            
            return `
                <div class="min-h-screen" style="background: ${bgColor}">
                    <nav class="py-5 px-6 md:px-12 flex justify-between items-center border-b border-white/10 backdrop-blur-md sticky top-0 z-50" style="background: ${bgColor}cc">
                        <div class="flex items-center gap-3">
                            <img src="${logoUrl}" class="w-10 h-10 rounded-full object-cover">
                            <span class="text-xl font-extrabold" style="color:${primary}">TradeLegends</span>
                        </div>
                        <button id="openAdminWindowBtn" class="text-sm px-4 py-2 rounded-full border border-white/30 hover:bg-white/10"><i class="fas fa-user-shield mr-1"></i> Admin Portal</button>
                    </nav>
                    <div class="relative overflow-hidden">
                        <div class="absolute inset-0 hero-gradient opacity-40"></div>
                        <div class="container mx-auto px-6 py-16 md:py-24 relative z-10">
                            <div class="flex flex-col lg:flex-row items-center gap-12">
                                <div class="flex-1 text-center lg:text-left">
                                    <h1 class="text-5xl md:text-6xl font-extrabold mb-4">${escapeHtml(siteSettings.heroTitle)}</h1>
                                    <p class="text-xl text-gray-300 max-w-xl mx-auto lg:mx-0 mb-8">${escapeHtml(siteSettings.heroSubtitle)}</p>
                                    <a href="#packages" class="px-6 py-3 rounded-full font-bold btn-glow" style="background:${primary}; color:#fff;">Εξερεύνηση Πακέτων</a>
                                </div>
                                <div class="flex-1 flex justify-center">
                                    <img src="${heroImg}" class="rounded-2xl shadow-2xl max-h-80 w-full object-cover border-2 border-white/20">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="packages" class="container mx-auto px-6 py-20">
                        <h2 class="text-4xl font-bold text-center mb-4">Εκπαιδευτικά Πακέτα</h2>
                        <p class="text-center text-gray-400 mb-12">Επιλέξτε το πρόγραμμα που ταιριάζει στους στόχους σας.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${packagesList.length === 0 ? '<div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-pulse"></i> Φόρτωση...</div>' : packagesHtml}
                        </div>
                    </div>
                    <footer class="border-t border-white/10 py-8 text-center text-gray-400 text-sm">${escapeHtml(siteSettings.footerText)}</footer>
                </div>
            `;
        }

        window.selectPackage = (packageId, packageName) => {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[1000] p-4';
            modalDiv.innerHTML = `
                <div class="glass-card max-w-md w-full p-6 rounded-2xl relative" style="background:#11121f;">
                    <button class="absolute top-3 right-4 text-white text-2xl" onclick="this.closest('.fixed').remove()">&times;</button>
                    <h3 class="text-2xl font-bold mb-2" style="color:${siteSettings.primaryColor}">Επιλογή Πακέτου</h3>
                    <p class="mb-4">Ενδιαφέρεστε για <strong>${escapeHtml(packageName)}</strong>. Αφήστε τα στοιχεία σας.</p>
                    <input type="text" id="leadName" placeholder="Ονοματεπώνυμο" class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700">
                    <input type="email" id="leadEmail" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-gray-800 border border-gray-700">
                    <button id="submitLeadBtn" class="w-full py-2 rounded-full font-bold" style="background:${siteSettings.primaryColor}; color:#000">Αποστολή & Επιλογή</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.getElementById('submitLeadBtn').onclick = async () => {
                const name = document.getElementById('leadName').value.trim();
                const email = document.getElementById('leadEmail').value.trim();
                if (!name || !email) { alert("Συμπληρώστε όνομα και email"); return; }
                try {
                    await addDoc(collection(db, "leads"), {
                        packageId, packageName, name, email, timestamp: new Date().toISOString(),
                        status: "❔"   // default status = pending
                    });
                    alert(`Ευχαριστούμε! Επιλέξατε το πακέτο ${packageName}.`);
                    modalDiv.remove();
                } catch(e) { alert("Σφάλμα: " + e.message); }
            };
        };

        // ADMIN VIEW (with updated leads tab)
        function renderAdminView() {
            if (!adminAuthorized) return renderAdminLogin();
            return `
                <div class="min-h-screen p-6" style="background:#0b0c15;">
                    <div class="max-w-6xl mx-auto">
                        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-crown text-3xl" style="color:${siteSettings.primaryColor}"></i>
                                <h1 class="text-3xl font-bold">Admin Manager — TradeLegends</h1>
                            </div>
                            <div class="flex gap-3">
                                <button id="viewMainSiteBtn" class="px-4 py-2 bg-gray-700 rounded-lg hover:bg-gray-600"><i class="fas fa-eye"></i> Κύρια Ιστοσελίδα</button>
                                <button id="adminLogoutBtn" class="px-4 py-2 bg-red-600 rounded-lg hover:bg-red-700"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
                            </div>
                        </div>
                        <div class="flex border-b border-gray-700 mb-6 gap-2">
                            <button class="tab-btn active-tab px-5 py-2 rounded-t-lg" data-tab="settings">🎨 Ρυθμίσεις Σχεδίασης</button>
                            <button class="tab-btn px-5 py-2 rounded-t-lg" data-tab="packages">📦 Διαχείριση Πακέτων</button>
                            <button class="tab-btn px-5 py-2 rounded-t-lg" data-tab="leads">📋 Εγγραφές Χρηστών</button>
                        </div>
                        <div id="adminTabContent" class="glass-card p-6 rounded-2xl" style="background:#10111f;"></div>
                    </div>
                </div>
            `;
        }

        function renderAdminLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center p-5" style="background:#0a0a14;">
                    <div class="glass-card max-w-md w-full p-8 rounded-2xl">
                        <div class="text-center mb-6">
                            <i class="fas fa-shield-alt text-5xl" style="color:#f7931a"></i>
                            <h2 class="text-2xl font-bold mt-2">Admin Authentication</h2>
                        </div>
                        <div id="adminAuthForm">
                            <input type="email" id="adminEmail" placeholder="Email" class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700">
                            <input type="password" id="adminPassword" placeholder="Κωδικός" class="w-full mb-4 p-3 rounded-lg bg-gray-800 border border-gray-700">
                            <button id="adminLoginBtn" class="w-full py-2 rounded-full font-bold mb-2" style="background:#f7931a; color:#000">Σύνδεση</button>
                            <button id="adminRegisterBtn" class="w-full py-2 rounded-full border border-gray-500 hover:bg-gray-800">Δημιουργία Λογαριασμού (Admin)</button>
                        </div>
                        <div id="adminAuthMsg" class="text-red-400 text-sm mt-3 text-center"></div>
                    </div>
                </div>
            `;
        }

        async function checkAdminAuthorization(user) {
            if (!user) return false;
            const adminDocRef = doc(db, "admin", "adminData");
            const adminSnap = await getDoc(adminDocRef);
            if (adminSnap.exists() && adminSnap.data().adminUid === user.uid) return true;
            if (!adminSnap.exists()) {
                await setDoc(adminDocRef, { adminUid: user.uid, createdAt: new Date().toISOString() });
                return true;
            }
            return false;
        }

        function loadAdminDashboardLogic() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab', 'bg-white/10'));
                    btn.classList.add('active-tab', 'bg-white/10');
                    if (btn.dataset.tab === 'settings') renderSettingsTab();
                    if (btn.dataset.tab === 'packages') renderPackagesTab();
                    if (btn.dataset.tab === 'leads') renderLeadsTab();
                };
            });
            renderSettingsTab();
        }

        async function renderSettingsTab() {
            const container = document.getElementById('adminTabContent');
            const s = siteSettings;
            container.innerHTML = `
                <h3 class="text-2xl font-bold mb-5">Προσαρμογή Ιστοσελίδας</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label>Primary Color</label><input type="color" id="primaryColor" value="${s.primaryColor}" class="w-full p-1 h-10 rounded"></div>
                    <div><label>Background Color</label><input type="color" id="backgroundColor" value="${s.backgroundColor}" class="w-full p-1 h-10 rounded"></div>
                    <div><label>Text Color</label><input type="color" id="textColor" value="${s.textColor}" class="w-full p-1 h-10 rounded"></div>
                    <div><label>Hero Image URL</label><input type="text" id="heroImageUrl" value="${s.heroImageUrl}" class="w-full p-2 rounded bg-gray-800"></div>
                    <div><label>Logo URL</label><input type="text" id="logoUrl" value="${s.logoUrl}" class="w-full p-2 rounded bg-gray-800"></div>
                    <div><label>Hero Title</label><input type="text" id="heroTitle" value="${escapeHtml(s.heroTitle)}" class="w-full p-2 rounded bg-gray-800"></div>
                    <div><label>Hero Subtitle</label><input type="text" id="heroSubtitle" value="${escapeHtml(s.heroSubtitle)}" class="w-full p-2 rounded bg-gray-800"></div>
                    <div><label>Footer Text</label><input type="text" id="footerText" value="${escapeHtml(s.footerText)}" class="w-full p-2 rounded bg-gray-800"></div>
                </div>
                <button id="saveSettingsBtn" class="mt-6 px-6 py-2 rounded-full font-bold" style="background:#f7931a; color:#000">Αποθήκευση</button>
                <div id="settingsMsg" class="mt-3 text-green-400"></div>
            `;
            document.getElementById('saveSettingsBtn').onclick = async () => {
                const updated = {
                    primaryColor: document.getElementById('primaryColor').value,
                    backgroundColor: document.getElementById('backgroundColor').value,
                    textColor: document.getElementById('textColor').value,
                    heroImageUrl: document.getElementById('heroImageUrl').value,
                    logoUrl: document.getElementById('logoUrl').value,
                    heroTitle: document.getElementById('heroTitle').value,
                    heroSubtitle: document.getElementById('heroSubtitle').value,
                    footerText: document.getElementById('footerText').value,
                };
                await updateDoc(doc(db, "settings", "siteConfig"), updated);
                document.getElementById('settingsMsg').innerText = "✅ Αποθηκεύτηκε!";
                setTimeout(() => document.getElementById('settingsMsg').innerText = "", 2000);
            };
        }

        async function renderPackagesTab() {
            const container = document.getElementById('adminTabContent');
            const pkgHtml = packagesList.map(p => `
                <div class="flex justify-between items-center border-b border-gray-700 py-3">
                    <div><strong>${escapeHtml(p.name)}</strong> - ${escapeHtml(p.price)}</div>
                    <div class="flex gap-2">
                        <button onclick="window.editPackage('${p.id}')" class="px-3 py-1 bg-blue-600 rounded-lg text-sm"><i class="fas fa-edit"></i> Επεξ</button>
                        <button onclick="window.deletePackageItem('${p.id}')" class="px-3 py-1 bg-red-600 rounded-lg text-sm"><i class="fas fa-trash"></i> Διαγραφή</button>
                    </div>
                </div>
            `).join('');
            container.innerHTML = `
                <h3 class="text-2xl font-bold mb-4">Πακέτα</h3>
                <button id="newPackageBtn" class="mb-5 px-4 py-2 rounded-lg bg-emerald-600"><i class="fas fa-plus"></i> Νέο Πακέτο</button>
                <div class="space-y-2 max-h-96 overflow-auto">${pkgHtml || '<p class="text-gray-400">Κανένα πακέτο</p>'}</div>
            `;
            document.getElementById('newPackageBtn').onclick = () => showPackageForm();
            window.editPackage = (id) => showPackageForm(packagesList.find(p => p.id === id));
            window.deletePackageItem = async (id) => { if(confirm("Διαγραφή;")) await deleteDoc(doc(db, "packages", id)); };
        }

        async function showPackageForm(existing = null) {
            const modalDiv = document.createElement('div');
            modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4";
            modalDiv.innerHTML = `
                <div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-md">
                    <h3 class="text-xl font-bold mb-3">${existing ? 'Επεξεργασία' : 'Νέο Πακέτο'}</h3>
                    <input id="pkgName" placeholder="Όνομα" value="${existing ? escapeHtml(existing.name) : ''}" class="w-full p-2 mb-3 rounded bg-gray-800">
                    <input id="pkgPrice" placeholder="Τιμή" value="${existing ? escapeHtml(existing.price) : ''}" class="w-full p-2 mb-3 rounded bg-gray-800">
                    <textarea id="pkgDesc" placeholder="Περιγραφή" class="w-full p-2 mb-3 rounded bg-gray-800">${existing ? escapeHtml(existing.description || '') : ''}</textarea>
                    <input id="pkgImage" placeholder="Εικόνα URL" value="${existing ? escapeHtml(existing.imageUrl || '') : ''}" class="w-full p-2 mb-3 rounded bg-gray-800">
                    <input id="pkgFeatures" placeholder="Χαρακτηριστικά (κόμμα)" value="${existing && existing.features ? (Array.isArray(existing.features) ? existing.features.join(',') : existing.features) : ''}" class="w-full p-2 mb-4 rounded bg-gray-800">
                    <div class="flex gap-3">
                        <button id="savePkgBtn" class="flex-1 py-2 rounded-lg bg-amber-500">Αποθήκευση</button>
                        <button id="cancelPkgBtn" class="flex-1 py-2 rounded-lg bg-gray-600">Άκυρο</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            modalDiv.querySelector('#savePkgBtn').onclick = async () => {
                const name = document.getElementById('pkgName').value.trim();
                if(!name) return alert("Όνομα απαραίτητο");
                const featuresRaw = document.getElementById('pkgFeatures').value;
                const featuresArr = featuresRaw ? featuresRaw.split(',').map(f=>f.trim()) : [];
                const pkgData = {
                    name, price: document.getElementById('pkgPrice').value,
                    description: document.getElementById('pkgDesc').value,
                    imageUrl: document.getElementById('pkgImage').value,
                    features: featuresArr,
                    order: existing ? existing.order : Date.now()
                };
                if (existing) await updateDoc(doc(db, "packages", existing.id), pkgData);
                else await addDoc(collection(db, "packages"), pkgData);
                modalDiv.remove();
            };
            modalDiv.querySelector('#cancelPkgBtn').onclick = () => modalDiv.remove();
        }

        // ------------------- NEW LEADS TAB WITH STATUS & DELETE -------------------
        async function renderLeadsTab() {
            const container = document.getElementById('adminTabContent');
            container.innerHTML = `<div class="text-center py-8"><i class="fas fa-spinner fa-pulse"></i> Φόρτωση εγγραφών...</div>`;
            
            // Fetch leads ordered by timestamp
            const leadsSnap = await getDocs(query(collection(db, "leads"), orderBy("timestamp", "desc")));
            let leadsHtml = `
                <h3 class="text-2xl font-bold mb-4">📋 Εγγραφές Χρηστών</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="border-b border-gray-600">
                            <tr class="text-left">
                                <th class="pb-2">Ονοματεπώνυμο</th>
                                <th class="pb-2">Email</th>
                                <th class="pb-2">Πακέτο</th>
                                <th class="pb-2">Κατάσταση</th>
                                <th class="pb-2">Ημερομηνία</th>
                                <th class="pb-2">Ενέργειες</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            if (leadsSnap.empty) {
                leadsHtml += `<tr><td colspan="6" class="text-center py-8 text-gray-400">Δεν υπάρχουν εγγραφές ακόμα.</td></tr>`;
            } else {
                for (const docSnap of leadsSnap.docs) {
                    const data = docSnap.data();
                    const leadId = docSnap.id;
                    const currentStatus = data.status || "❔";
                    leadsHtml += `
                        <tr class="border-b border-gray-700/50 hover:bg-white/5">
                            <td class="py-3 font-medium">${escapeHtml(data.name || '?')}</td>
                            <td class="py-3">${escapeHtml(data.email || '')}</td>
                            <td class="py-3">${escapeHtml(data.packageName || '—')}</td>
                            <td class="py-3">
                                <div class="flex gap-2 text-2xl">
                                    <button class="status-emoji hover:scale-110 transition" data-lead-id="${leadId}" data-status="✅">✅</button>
                                    <button class="status-emoji hover:scale-110 transition" data-lead-id="${leadId}" data-status="❌">❌</button>
                                    <button class="status-emoji hover:scale-110 transition" data-lead-id="${leadId}" data-status="❔">❔</button>
                                </div>
                                <span class="ml-2 text-sm inline-block mt-1" style="color:${siteSettings.primaryColor}">${currentStatus}</span>
                            </td>
                            <td class="py-3 text-xs text-gray-400">${new Date(data.timestamp).toLocaleString()}</td>
                            <td class="py-3">
                                <button class="delete-lead text-red-400 hover:text-red-300 text-xl" data-lead-id="${leadId}"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `;
                }
            }
            leadsHtml += `</tbody></table></div>`;
            container.innerHTML = leadsHtml;
            
            // Attach event listeners for status buttons
            document.querySelectorAll('.status-emoji').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const leadId = btn.getAttribute('data-lead-id');
                    const newStatus = btn.getAttribute('data-status');
                    try {
                        await updateDoc(doc(db, "leads", leadId), { status: newStatus });
                        // Refresh the leads tab to show updated status
                        renderLeadsTab();
                    } catch(err) { console.error(err); alert("Σφάλμα κατά την ενημέρωση κατάστασης"); }
                });
            });
            
            // Attach delete listeners
            document.querySelectorAll('.delete-lead').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const leadId = btn.getAttribute('data-lead-id');
                    if (confirm("Θα διαγραφεί οριστικά αυτή η εγγραφή. Συνέχεια;")) {
                        try {
                            await deleteDoc(doc(db, "leads", leadId));
                            renderLeadsTab();  // refresh
                        } catch(err) { alert("Σφάλμα διαγραφής: " + err.message); }
                    }
                });
            });
        }

        // ------------------------------------------------------------
        function renderCurrentView() {
            const root = document.getElementById('root');
            if (currentMode === 'user') {
                root.innerHTML = renderUserView();
                document.getElementById('openAdminWindowBtn')?.addEventListener('click', () => {
                    const url = new URL(window.location.href);
                    url.searchParams.set('admin', 'true');
                    window.open(url.toString(), '_blank', 'width=1300,height=900,resizable=yes');
                });
            } else {
                root.innerHTML = renderAdminView();
                if (adminAuthorized) {
                    setTimeout(() => loadAdminDashboardLogic(), 50);
                    document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => {
                        await signOut(auth);
                        window.location.reload();
                    });
                    document.getElementById('viewMainSiteBtn')?.addEventListener('click', () => {
                        const mainUrl = new URL(window.location.href);
                        mainUrl.searchParams.delete('admin');
                        window.open(mainUrl.toString(), '_blank');
                    });
                } else {
                    attachAdminAuthEvents();
                }
            }
        }

        function attachAdminAuthEvents() {
            document.getElementById('adminLoginBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('adminEmail').value;
                const pwd = document.getElementById('adminPassword').value;
                try {
                    const cred = await signInWithEmailAndPassword(auth, email, pwd);
                    const isAdmin = await checkAdminAuthorization(cred.user);
                    if (isAdmin) { adminAuthorized = true; currentAdminUser = cred.user; renderCurrentView(); }
                    else document.getElementById('adminAuthMsg').innerText = "Δεν είστε διαχειριστής.";
                } catch(e) { document.getElementById('adminAuthMsg').innerText = e.message; }
            });
            document.getElementById('adminRegisterBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('adminEmail').value;
                const pwd = document.getElementById('adminPassword').value;
                if (!email || !pwd) return alert("Συμπληρώστε email & password");
                try {
                    const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
                    const adminDocRef = doc(db, "admin", "adminData");
                    const snap = await getDoc(adminDocRef);
                    if (!snap.exists()) {
                        await setDoc(adminDocRef, { adminUid: userCred.user.uid });
                        adminAuthorized = true; currentAdminUser = userCred.user; renderCurrentView();
                    } else alert("Υπάρχει ήδη admin. Συνδεθείτε.");
                } catch(e) { document.getElementById('adminAuthMsg').innerText = e.message; }
            });
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMode = urlParams.get('admin') === 'true' ? 'admin' : 'user';
            await initRealtimeSync();
            if (currentMode === 'admin') {
                onAuthStateChanged(auth, async (user) => {
                    if (user) adminAuthorized = await checkAdminAuthorization(user);
                    else adminAuthorized = false;
                    renderCurrentView();
                });
            } else {
                renderCurrentView();
            }
        }
        init();
    </script>
</body>
</html>
