        .carousel-slide img:hover { transform: scale(1.02); }
        .carousel-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; }

            mainCarousel: '[{"image":"https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200","link":"https://www.binance.com"},{"image":"https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=1200","link":"https://www.coinbase.com"},{"image":"https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=1200","link":"https://www.tradingview.com"},{"image":"https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=1200","link":"https://www.coingecko.com"}]',
            disclaimerText: '⚠️ ΠΡΟΣΟΧΗ: Οι επενδύσεις σε κρύπτο και χρηματοοικονομικά προϊόντα ενέχουν υψηλό κίνδυνο. Οι προηγούμενες αποδόσεις δεν εγγυώνται μελλοντικά αποτελέσματα. Το TradeLegends παρέχει αποκλειστικά εκπαιδευτικό περιεχόμενο και όχι επενδυτικές συμβουλές. Συμβουλευτείτε πάντα έναν εξειδικευμένο σύμβουλο πριν προβείτε σε επένδυση.',

        };
        let packagesList = [];
        let announcementsList = [];
        let mainCarouselList = [];
        
        // Gallery arrays
        let homeGallery = [];
        let educationGallery = [];
        let mentorGallery = [];
        let communityGallery = [];
        let pricingGallery = [];

        function parseGallery(jsonStr, defaultArr) {
            try {
                let arr = JSON.parse(jsonStr);
                if (Array.isArray(arr)) return arr;
                return defaultArr;
            } catch(e) { return defaultArr; }
        }
        
        function parseMainCarousel() {
            try {
                if (typeof siteSettings.mainCarousel === 'string') {
                    mainCarouselList = JSON.parse(siteSettings.mainCarousel);
                } else if (Array.isArray(siteSettings.mainCarousel)) {
                    mainCarouselList = siteSettings.mainCarousel;
                } else { mainCarouselList = []; }
            } catch(e) { mainCarouselList = []; }
            if (!mainCarouselList.length) {
                mainCarouselList = [{image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200', link: 'https://www.binance.com'}];
            }
        }

        function parseAllGalleries() {
            homeGallery = parseGallery(siteSettings.homeImages, [{image: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', link: ''}]);
            educationGallery = parseGallery(siteSettings.educationImages, [{image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800', link: ''}]);
            mentorGallery = parseGallery(siteSettings.mentorImages, [{image: 'https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=800', link: ''}]);
            communityGallery = parseGallery(siteSettings.communityImages, [{image: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=800', link: ''}]);
            pricingGallery = parseGallery(siteSettings.pricingImages, [{image: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', link: ''}]);
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function applyTheme(settings) {
            if (!settings) return;
            document.documentElement.style.setProperty('--primary-color', settings.primaryColor);
            document.body.style.backgroundColor = settings.backgroundColor;
            document.body.style.color = settings.textColor;
        }
        function getLocalizedField(field) {
            let val = siteSettings[field];
            if (currentLanguage === 'en' && siteSettings[field + '_en']) val = siteSettings[field + '_en'];
            return escapeHtml(val);
        }
        function getDisclaimerText() {
            return currentLanguage === 'en' ? escapeHtml(siteSettings.disclaimerText_en) : escapeHtml(siteSettings.disclaimerText);
        }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                parseMainCarousel();
                parseAllGalleries();
                applyTheme(siteSettings);
                renderCurrentView();
            });
            if (packagesUnsubscribe) packagesUnsubscribe();
            const q = query(collection(db, "packages"), orderBy("order", "asc"));
            packagesUnsubscribe = onSnapshot(q, (snapshot) => {
                packagesList = [];
                snapshot.forEach(doc => packagesList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
            if (announcementsUnsubscribe) announcementsUnsubscribe();
            const announcementsQuery = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
            announcementsUnsubscribe = onSnapshot(announcementsQuery, (snapshot) => {
                announcementsList = [];
                snapshot.forEach(doc => announcementsList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
        }

        let currentPage = 'home';
        let mainCarouselInterval = null;
        let currentMainSlide = 0;

        function setPage(page) { currentPage = page; window.location.hash = page; renderCurrentView(); }
        function getPageFromHash() { let hash = window.location.hash.substring(1); if (['home','education','mentor','community','pricing','contact'].includes(hash)) return hash; return 'home'; }
        window.addEventListener('hashchange', () => { if (currentMode === 'user') { currentPage = getPageFromHash(); renderCurrentView(); } });

        function initMainCarousel() {
            if (mainCarouselInterval) clearInterval(mainCarouselInterval);
            const slidesContainer = document.getElementById('mainCarouselSlides');
            const dotsContainer = document.getElementById('mainCarouselDots');
            if (!slidesContainer || !dotsContainer || mainCarouselList.length === 0) return;
            slidesContainer.innerHTML = '';
            mainCarouselList.forEach((item, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'carousel-slide';
                const linkUrl = item.link && item.link.trim() ? item.link : '#';
                const imgHtml = `<img src="${escapeHtml(item.image)}" alt="Slide ${idx+1}" onerror="this.src='https://via.placeholder.com/1200x400?text=Image+Not+Found'">`;
                if (linkUrl !== '#') {
                    slideDiv.innerHTML = `<a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">${imgHtml}</a>`;
                } else {
                    slideDiv.innerHTML = imgHtml;
                }
                slidesContainer.appendChild(slideDiv);
            });
            dotsContainer.innerHTML = '';
            mainCarouselList.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToMainSlide(idx));
                dotsContainer.appendChild(dot);
            });
            function goToMainSlide(index) {
                currentMainSlide = index;
                slidesContainer.style.transform = `translateX(-${currentMainSlide * 100}%)`;
                document.querySelectorAll('#mainCarouselDots .carousel-dot').forEach((dot, i) => {
                    if (i === currentMainSlide) dot.classList.add('active');
                    else dot.classList.remove('active');
                });
            }
            window.goToMainSlide = goToMainSlide;
            mainCarouselInterval = setInterval(() => {
                if (mainCarouselList.length > 0) {
                    currentMainSlide = (currentMainSlide + 1) % mainCarouselList.length;
                    goToMainSlide(currentMainSlide);
                }
            }, 5000);
            goToMainSlide(0);
        }

        // Render a carousel for a gallery
        function renderGalleryCarousel(gallery, containerId, dotContainerId) {
            if (!gallery.length) return;
            const slidesContainer = document.getElementById(containerId);
            const dotsContainer = document.getElementById(dotContainerId);
            if (!slidesContainer || !dotsContainer) return;
            slidesContainer.innerHTML = '';
            gallery.forEach((item, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'carousel-slide';
                const linkUrl = item.link && item.link.trim() ? item.link : '#';
                const imgHtml = `<img src="${escapeHtml(item.image)}" alt="Slide ${idx+1}" onerror="this.src='https://via.placeholder.com/1200x400?text=Image+Not+Found'">`;
                if (linkUrl !== '#') {
                    slideDiv.innerHTML = `<a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">${imgHtml}</a>`;
                } else {
                    slideDiv.innerHTML = imgHtml;
                }
                slidesContainer.appendChild(slideDiv);
            });
            dotsContainer.innerHTML = '';
            gallery.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => {
                    slidesContainer.style.transform = `translateX(-${idx * 100}%)`;
                    document.querySelectorAll(`#${dotContainerId} .carousel-dot`).forEach((d, i) => d.classList.toggle('active', i === idx));
                });
                dotsContainer.appendChild(dot);
            });
            // Auto rotate every 5 seconds
            let interval = setInterval(() => {
                let currentIdx = 0;
                const slides = slidesContainer.children;
                for (let i = 0; i < slides.length; i++) {
                    if (slides[i].getBoundingClientRect().left >= -10 && slides[i].getBoundingClientRect().left < window.innerWidth) {
                        currentIdx = i;
                        break;
                    }
                }
                let nextIdx = (currentIdx + 1) % gallery.length;
                slidesContainer.style.transform = `translateX(-${nextIdx * 100}%)`;
                document.querySelectorAll(`#${dotContainerId} .carousel-dot`).forEach((d, i) => d.classList.toggle('active', i === nextIdx));
            }, 5000);
            slidesContainer.parentElement._interval = interval;
        }

        function renderSectionWithGallery(content, gallery, primaryColor) {
            const galleryId = `gallery_${Date.now()}_${Math.random()}`;

            return `
                <div class="glass-card p-8 rounded-2xl" style="background: rgba(0,0,0,0.3);">
                    ${galleryHtml}
                    <p class="text-lg leading-relaxed">${content}</p>
                </div>
                <script>
                    setTimeout(() => {
                        const slides = document.getElementById('${galleryId}');
                        const dots = document.getElementById('${dotsId}');
                        if(slides && dots && ${JSON.stringify(gallery)}.length) {
                            const g = ${JSON.stringify(gallery)};
                            slides.innerHTML = '';
                            g.forEach((item, idx) => {
                                const div = document.createElement('div');
                                div.className = 'carousel-slide';
                                const linkUrl = item.link && item.link.trim() ? item.link : '#';
                                const imgHtml = '<img src="${escapeHtml(item.image)}" onerror="this.src='https://via.placeholder.com/1200x400'">';
                                div.innerHTML = linkUrl !== '#' ? '<a href="'+linkUrl+'" target="_blank">'+imgHtml+'</a>' : imgHtml;
                                slides.appendChild(div);
                            });
                            dots.innerHTML = '';
                            g.forEach((_, idx) => {
                                const dot = document.createElement('div');
                                dot.className = 'carousel-dot ' + (idx === 0 ? 'active' : '');
                                dot.onclick = () => {
                                    slides.style.transform = 'translateX(-' + (idx * 100) + '%)';
                                    dots.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
                                };
                                dots.appendChild(dot);
                            });
                            let interval = setInterval(() => {
                                let current = 0;
                                for(let i=0;i<slides.children.length;i++) {
                                    if(slides.children[i].getBoundingClientRect().left >= -10 && slides.children[i].getBoundingClientRect().left < window.innerWidth) {
                                        current = i; break;
                                    }
                                }
                                let next = (current + 1) % g.length;
                                slides.style.transform = 'translateX(-' + (next * 100) + '%)';
                                dots.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === next));
                            }, 5000);
                            slides.parentElement._interval = interval;
                        }
                    }, 100);
                <\/script>
            `;
        }

        // Gallery editor component (reusable)
        function createGalleryEditor(gallery, galleryName, onSave) {
            const container = document.createElement('div');
            container.className = 'space-y-3 mb-8';
            function refresh() {
                container.innerHTML = `<h3 class="font-bold text-lg mb-3">🖼️ ${galleryName} Gallery (drag to reorder, zoom, add links)</h3>`;
                gallery.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-editor-item flex flex-col md:flex-row items-center gap-4';
                    div.setAttribute('data-idx', idx);
                    div.innerHTML = `
                        <div class="sortable-handle"><i class="fas fa-grip-vertical text-gray-400 text-2xl"></i></div>
                        <div class="image-preview-container relative">
                            <img src="${escapeHtml(item.image)}" class="preview-img" onerror="this.src='https://via.placeholder.com/120x80?text=Error'">
                            <div class="zoom-controls"><button class="zoom-in" data-idx="${idx}"><i class="fas fa-search-plus"></i></button><button class="zoom-out" data-idx="${idx}"><i class="fas fa-search-minus"></i></button></div>
                        </div>
                        <div class="flex-1 w-full space-y-2">
                            <input type="text" class="image-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.image)}" placeholder="Image URL (1920x1080 recommended)">
                            <input type="text" class="link-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.link || '')}" placeholder="Link URL (optional)">
                            <button class="delete-item bg-red-600 text-xs px-3 py-1 rounded"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                const addBtn = document.createElement('button');
                addBtn.className = 'mt-3 bg-emerald-600 text-sm px-4 py-2 rounded-lg w-full md:w-auto';
                addBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Image';
                addBtn.onclick = () => {
                    gallery.push({ image: 'https://via.placeholder.com/1920x1080?text=New+Image', link: '' });
                    refresh();
                    onSave(gallery);
                };
                container.appendChild(addBtn);
                
                container.querySelectorAll('.zoom-in').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                        let scale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                        scale = Math.min(scale + 0.2, 3);
                        img.style.transform = `scale(${scale})`;
                    });
                });
                container.querySelectorAll('.zoom-out').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                        let scale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                        scale = Math.max(scale - 0.2, 0.5);
                        img.style.transform = `scale(${scale})`;
                    });
                });
                container.querySelectorAll('.image-url').forEach((input, i) => {
                    input.addEventListener('change', () => {
                        gallery[i].image = input.value;
                        onSave(gallery);
                    });
                });
                container.querySelectorAll('.link-url').forEach((input, i) => {
                    input.addEventListener('change', () => {
                        gallery[i].link = input.value;
                        onSave(gallery);
                    });
                });
                container.querySelectorAll('.delete-item').forEach((btn, i) => {
                    btn.addEventListener('click', () => {
                        gallery.splice(i, 1);
                        refresh();
                        onSave(gallery);
                    });
                });
            }
            refresh();
            if (window.sortable) {
                window.sortable(container, { items: '.image-editor-item', handle: '.sortable-handle', onDrop: () => {
                    const newItems = [];
                    container.querySelectorAll('.image-editor-item').forEach(el => {
                        const imgUrl = el.querySelector('.image-url').value;
                        const linkUrl = el.querySelector('.link-url').value;
                        newItems.push({ image: imgUrl, link: linkUrl });
                    });
                    gallery.length = 0;
                    newItems.forEach(i => gallery.push(i));
                    onSave(gallery);
                }});
            }
            return container;
        }

        function renderCarouselEditor() {
            const container = document.createElement('div');
            container.className = 'space-y-3 mb-6';
            function refreshEditor() {
                container.innerHTML = '<h3 class="font-bold text-lg mb-3">🎠 Main Carousel Images (drag to reorder, click images to zoom, add links)</h3>';
                mainCarouselList.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-editor-item flex flex-col md:flex-row items-center gap-4';
                    div.setAttribute('data-idx', idx);
                    div.innerHTML = `
                        <div class="sortable-handle"><i class="fas fa-grip-vertical text-gray-400 text-2xl"></i></div>
                        <div class="image-preview-container relative">
                            <img src="${escapeHtml(item.image)}" class="preview-img" onerror="this.src='https://via.placeholder.com/120x80?text=Error'">
                            <div class="zoom-controls"><button class="zoom-in" data-idx="${idx}"><i class="fas fa-search-plus"></i></button><button class="zoom-out" data-idx="${idx}"><i class="fas fa-search-minus"></i></button></div>
                        </div>
                        <div class="flex-1 w-full space-y-2">
                            <input type="text" class="image-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.image)}" placeholder="Image URL">
                            <input type="text" class="link-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.link || '')}" placeholder="Link URL (optional)">
                            <button class="delete-item bg-red-600 text-xs px-3 py-1 rounded"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                const addBtn = document.createElement('button');
                addBtn.className = 'mt-3 bg-emerald-600 text-sm px-4 py-2 rounded-lg w-full md:w-auto';
                addBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Slide';
                addBtn.onclick = () => {
                    mainCarouselList.push({ image: 'https://via.placeholder.com/1200x400?text=New+Slide', link: '' });
                    refreshEditor();
                    saveCarouselToFirebase();
                };
                container.appendChild(addBtn);
                
                container.querySelectorAll('.zoom-in').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                        let scale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                        scale = Math.min(scale + 0.2, 3);
                        img.style.transform = `scale(${scale})`;
                    });
                });
                container.querySelectorAll('.zoom-out').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                        let scale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                        scale = Math.max(scale - 0.2, 0.5);
                        img.style.transform = `scale(${scale})`;
                    });
                });
                container.querySelectorAll('.image-url').forEach((input, i) => {
                    input.addEventListener('change', () => {
                        mainCarouselList[i].image = input.value;
                        saveCarouselToFirebase();
                    });
                });
                container.querySelectorAll('.link-url').forEach((input, i) => {
                    input.addEventListener('change', () => {
                        mainCarouselList[i].link = input.value;
                        saveCarouselToFirebase();
                    });
                });
                container.querySelectorAll('.delete-item').forEach((btn, i) => {
                    btn.addEventListener('click', () => {
                        mainCarouselList.splice(i, 1);
                        refreshEditor();
                        saveCarouselToFirebase();
                    });
                });
            }
            function saveCarouselToFirebase() {
                updateDoc(doc(db, "settings", "siteConfig"), { mainCarousel: JSON.stringify(mainCarouselList) }).catch(console.error);
                const msg = document.getElementById('carouselSaveMsg');
                if(msg) { msg.innerText = "✅ Carousel saved!"; setTimeout(()=>msg.innerText="",2000); }
            }
            refreshEditor();
            if (window.sortable) {
                window.sortable(container, { items: '.image-editor-item', handle: '.sortable-handle', onDrop: () => {
                    const newItems = [];
                    container.querySelectorAll('.image-editor-item').forEach(el => {
                        const imgUrl = el.querySelector('.image-url').value;
                        const linkUrl = el.querySelector('.link-url').value;
                        newItems.push({ image: imgUrl, link: linkUrl });
                    });
                    mainCarouselList = newItems;
                    saveCarouselToFirebase();
                }});
            }
            return container;
        }

        function renderCurrentView() {
            const root = document.getElementById('root');
            if (currentMode === 'user') {
                root.innerHTML = renderUserView();
                const trigger = document.querySelector('.dropdown-trigger');
                const dropdown = document.querySelector('.dropdown-menu');
                if (trigger && dropdown) {
                    trigger.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); });
                    document.addEventListener('click', (e) => { if (!trigger.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show'); });
                    dropdown.querySelectorAll('a').forEach(link => {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            const page = link.getAttribute('data-page');
                            if (page) setPage(page);
                            dropdown.classList.remove('show');
                        });
                    });
                }
                document.getElementById('openAdminWindowBtn')?.addEventListener('click', () => { const url = new URL(window.location.href); url.searchParams.set('admin','true'); window.open(url.toString(), '_blank', 'width=1300,height=900'); });
                document.getElementById('langEl')?.addEventListener('click', () => { currentLanguage = 'el'; renderCurrentView(); });
                document.getElementById('langEn')?.addEventListener('click', () => { currentLanguage = 'en'; renderCurrentView(); });
                const contactForm = document.getElementById('contactForm');
                if(contactForm) contactForm.onsubmit = async (e) => { e.preventDefault(); const name = document.getElementById('contactName').value.trim(), email = document.getElementById('contactEmailInput').value.trim(), message = document.getElementById('contactMessage').value.trim(); if(!name||!email||!message) return alert("Fill all fields"); try { await addDoc(collection(db,"contactMessages"),{name,email,message,timestamp:new Date().toISOString()}); document.getElementById('contactFormMsg').innerText = "✅ Sent!"; contactForm.reset(); setTimeout(()=>document.getElementById('contactFormMsg').innerText="",3000); } catch(e){ alert("Error"); } };
                if (currentPage === 'home') { setTimeout(() => initMainCarousel(), 100); }
            } else {
                if (mainCarouselInterval) clearInterval(mainCarouselInterval);
                root.innerHTML = renderAdminView();
                if (adminAuthorized) { setTimeout(()=>loadAdminDashboardLogic(),50); document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.reload(); }); document.getElementById('viewMainSiteBtn')?.addEventListener('click', () => { const mainUrl = new URL(window.location.href); mainUrl.searchParams.delete('admin'); window.open(mainUrl.toString(), '_blank'); }); }
                else { attachAdminAuthEvents(); }
            }
        }
        function attachAdminAuthEvents() { document.getElementById('adminLoginBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; try { const cred = await signInWithEmailAndPassword(auth, email, pwd); if(await checkAdminAuthorization(cred.user)) { adminAuthorized=true; renderCurrentView(); } else document.getElementById('adminAuthMsg').innerText="Not admin."; } catch(e){ document.getElementById('adminAuthMsg').innerText=e.message; } }); document.getElementById('adminRegisterBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; if(!email||!pwd) return; try { const userCred = await createUserWithEmailAndPassword(auth, email, pwd); const adminDocRef = doc(db,"admin","adminData"); const snap = await getDoc(adminDocRef); if(!snap.exists()) { await setDoc(adminDocRef, { adminUid: userCred.user.uid }); adminAuthorized=true; renderCurrentView(); } else alert("Admin already exists."); } catch(e){ alert(e.message); } }); }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMode = urlParams.get('admin') === 'true' ? 'admin' : 'user';
            await initRealtimeSync();
            if (currentMode === 'admin') onAuthStateChanged(auth, async (user) => { if (user) adminAuthorized = await checkAdminAuthorization(user); else adminAuthorized = false; renderCurrentView(); });
            else { currentPage = getPageFromHash(); renderCurrentView(); }
            setTimeout(() => { const ld = document.getElementById('loadingScreen'); if(ld) { ld.classList.add('fade-out'); setTimeout(()=>{if(ld&&ld.parentNode) ld.style.display='none';},800); } }, 3000);
        }
        init();
    </script>
