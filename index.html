    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s ease, color 0.2s ease; margin: 0; overflow-x: hidden; }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/S7cgyHJ2/fcd9ca6e-d05e-497c-90a6-c833528f92d4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            backdrop-filter: brightness(0.7) blur(2px);
        }
        .loading-screen::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 31, 0.65); z-index: 1; }
        .loading-content { position: relative; z-index: 2; text-align: center; animation: pulseGlow 1.5s infinite ease-in-out; }
        .loading-logo { width: 180px; height: auto; border-radius: 32px; box-shadow: 0 0 30px rgba(247, 147, 26, 0.4); animation: floatLogo 2s infinite alternate; }
        .loading-text { margin-top: 24px; font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #f7931a, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
        .loading-dots span { display: inline-block; animation: dotBlink 1.4s infinite; font-size: 2rem; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulseGlow { 0% { transform: scale(0.98); opacity: 0.8; } 100% { transform: scale(1.02); opacity: 1; } }
        @keyframes floatLogo { 0% { transform: translateY(0px); } 100% { transform: translateY(-12px); } }
        @keyframes dotBlink { 0%, 20% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .loading-screen.fade-out { opacity: 0; visibility: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.15); }
        .package-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .package-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.3); }
        .btn-glow { transition: all 0.2s; }
        .btn-glow:hover { filter: brightness(1.05); box-shadow: 0 0 12px currentColor; }
        .hero-gradient { background: radial-gradient(circle at 10% 30%, rgba(0,255,255,0.08) 0%, rgba(0,0,0,0) 60%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #f0b90b; border-radius: 10px; }
        .nav-link { transition: all 0.2s; position: relative; cursor: pointer; }
        .nav-link:hover { opacity: 0.8; }
        .nav-link.active { font-weight: 700; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: currentColor; border-radius: 2px; }
        @media (max-width: 768px) { .nav-scroll { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; } .nav-flex { display: inline-flex; gap: 1.5rem; } }
        .page-transition { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lang-btn { transition: all 0.2s; cursor: pointer; }
        .lang-btn.active { font-weight: bold; text-decoration: underline; }
        .carousel-container { position: relative; overflow: hidden; border-radius: 1.5rem; box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5); }
        .carousel-slides { display: flex; transition: transform 0.5s ease-in-out; }
        .carousel-slide { flex: 0 0 100%; }
        .carousel-slide img { width: 100%; height: 400px; object-fit: cover; }
        .carousel-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; }
        .carousel-dot.active { background: white; transform: scale(1.2); }
        .small-carousel-container { position: relative; overflow: hidden; border-radius: 1rem; box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4); background: rgba(0,0,0,0.3); }
        .small-carousel-slides { display: flex; transition: transform 0.5s ease-in-out; }
        .small-carousel-slide { flex: 0 0 100%; }
        .small-carousel-slide img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; transition: transform 0.2s; }
        .small-carousel-slide img:hover { transform: scale(1.02); }
        .small-carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; margin: 0 3px; }
        .small-carousel-dot.active { background: white; transform: scale(1.2); }
        @media (max-width: 768px) { .carousel-slide img { height: 250px; } .small-carousel-slide img { height: 120px; } }
        .disclaimer-card { background: rgba(0,0,0,0.6); border-left: 4px solid #f7931a; font-size: 0.8rem; }
        .links-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1.5rem; }
        /* Admin image editor styles */
        .image-editor-item { transition: all 0.2s; cursor: grab; }
        .image-editor-item:active { cursor: grabbing; }
        .image-preview-container { position: relative; display: inline-block; }
        .zoom-controls { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); border-radius: 20px; padding: 4px 8px; display: flex; gap: 8px; z-index: 10; }
        .zoom-controls button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 50%; transition: all 0.2s; }
        .zoom-controls button:hover { background: rgba(255,255,255,0.2); }
        .preview-img { transition: transform 0.2s ease; transform-origin: center center; }
        .sortable-handle { cursor: grab; padding: 4px; }
        .sortable-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="text-gray-200">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="https://i.ibb.co/Rp4NpbPL/Edit-the-existing-lo3.jpg" alt="TradeLegends Logo" class="loading-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4664/4664838.png'">
            <div class="loading-text mt-4">TradeLegends</div>
            <div class="loading-dots mt-2"><span>.</span><span>.</span><span>.</span></div>
            <p class="text-gray-200 text-sm mt-4 font-medium">Loading premium content...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxtXsrp9kk0nHfuw53CQ-KUqVYukyRZqM",
            authDomain: "tradelegends-ee76e.firebaseapp.com",
            projectId: "tradelegends-ee76e",
            storageBucket: "tradelegends-ee76e.firebasestorage.app",
            messagingSenderId: "70719513507",
            appId: "1:70719513507:web:f9e6edb7cbedfe0a2c7016"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentMode = 'user';
        let adminAuthorized = false;
        let settingsUnsubscribe = null;
        let packagesUnsubscribe = null;
        let announcementsUnsubscribe = null;
        let currentLanguage = 'el';
        
        const translations = {
            el: { home: "Αρχική", education: "Εκπαίδευση", mentor: "Mentor", community: "Κοινότητα", pricing: "Τιμολόγηση", contact: "Επικοινωνία", adminPortal: "Admin Portal", explorePackages: "Εξερεύνηση Πακέτων", latestNews: "Τελευταία Νέα & Ανακοινώσεις", contactForm: "Φόρμα Επικοινωνίας", send: "Αποστολή Μηνύματος", name: "Ονοματεπώνυμο", email: "Email", message: "Το μήνυμά σας", contactInfo: "Στοιχεία Επικοινωνίας", selectPackage: "Επιλέξτε Πακέτο", oneTime: "εφάπαξ", loading: "Φόρτωση...", noAnnouncements: "Νέες ανακοινώσεις σύντομα...", disclaimer: "⚠️ Σημαντική Αποποίηση Ευθύνης", partnersLinks: "🔗 Χρήσιμοι Σύνδεσμοι & Συνεργάτες" },
            en: { home: "Home", education: "Education", mentor: "Mentor", community: "Community", pricing: "Pricing", contact: "Contact", adminPortal: "Admin Portal", explorePackages: "Explore Packages", latestNews: "Latest News & Announcements", contactForm: "Contact Form", send: "Send Message", name: "Full Name", email: "Email", message: "Your Message", contactInfo: "Contact Info", selectPackage: "Select Package", oneTime: "one-time", loading: "Loading...", noAnnouncements: "New announcements soon...", disclaimer: "⚠️ Risk Disclaimer", partnersLinks: "🔗 Useful Links & Partners" }
        };
        function t(key) { return translations[currentLanguage][key] || key; }

        let siteSettings = {
            primaryColor: '#f7931a',
            backgroundColor: '#0a0a1f',
            textColor: '#f0f0f0',
            logoUrl: 'https://cdn-icons-png.flaticon.com/512/4664/4664838.png',
            footerText: '© 2025 TradeLegends — Empowering Financial Freedom',
            heroTitle: 'Master Crypto & Financial Markets',
            heroSubtitle: 'Learn to trade like a legend with expert-led courses and real market insights.',
            heroImageUrl: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?q=80&w=2070&auto=format',
            homeContent: 'Καλώς ήρθατε στο TradeLegends! Ανακαλύψτε τον κόσμο των κρύπτο και των χρηματοοικονομικών αγορών με κορυφαίους mentors και μία ενεργή κοινότητα.',
            educationContent: 'Ανακαλύψτε τα βασικά και προχωρημένα θέματα των κρύπτο και των χρηματοοικονομικών αγορών.',
            mentorContent: 'Η ομάδα μας αποτελείται από επαγγελματίες traders με χρόνια εμπειρίας.',
            communityContent: 'Γίνετε μέλος σε μια αποκλειστική κοινότητα φιλόδοξων επενδυτών.',
            pricingContent: 'Επιλέξτε το πρόγραμμα που ταιριάζει στους στόχους σας.',
            contactEmail: 'support@tradelegends.com',
            contactPhone: '+30 210 1234567',
            contactAddress: 'Αθήνα, Ελλάδα',
            heroTitle_en: 'Master Crypto & Financial Markets',
            heroSubtitle_en: 'Learn to trade like a legend with expert-led courses and real market insights.',
            homeContent_en: 'Welcome to TradeLegends! Discover the world of crypto and financial markets.',
            educationContent_en: 'Discover basic and advanced topics of crypto and financial markets.',
            mentorContent_en: 'Our team consists of professional traders with years of experience.',
            communityContent_en: 'Join an exclusive community of ambitious investors.',
            pricingContent_en: 'Choose the program that fits your goals.',
            carouselImages: '["https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200","https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=1200","https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=1200","https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=1200"]',
            linksCarousel: '[{"image":"https://images.unsplash.com/photo-1563986768609-322da13575f3?w=600","url":"https://www.binance.com"},{"image":"https://images.unsplash.com/photo-1622630998477-20aa696ecb05?w=600","url":"https://www.coinbase.com"},{"image":"https://images.unsplash.com/photo-1605792657660-596af9009e82?w=600","url":"https://www.tradingview.com"},{"image":"https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=600","url":"https://www.coingecko.com"}]',
            disclaimerText: '⚠️ ΠΡΟΣΟΧΗ: Οι επενδύσεις σε κρύπτο και χρηματοοικονομικά προϊόντα ενέχουν υψηλό κίνδυνο. Οι προηγούμενες αποδόσεις δεν εγγυώνται μελλοντικά αποτελέσματα. Το TradeLegends παρέχει αποκλειστικά εκπαιδευτικό περιεχόμενο και όχι επενδυτικές συμβουλές. Συμβουλευτείτε πάντα έναν εξειδικευμένο σύμβουλο πριν προβείτε σε επένδυση.',
            disclaimerText_en: '⚠️ WARNING: Crypto and financial investments involve high risk. Past performance does not guarantee future results. TradeLegends provides educational content only, not investment advice. Always consult a qualified advisor before investing.'
        };
        let packagesList = [];
        let announcementsList = [];
        let carouselImagesList = [];
        let linksCarouselList = [];

        function parseCarouselImages() {
            try {
                if (typeof siteSettings.carouselImages === 'string') {
                    carouselImagesList = JSON.parse(siteSettings.carouselImages);
                } else if (Array.isArray(siteSettings.carouselImages)) {
                    carouselImagesList = siteSettings.carouselImages;
                } else { carouselImagesList = []; }
            } catch(e) { carouselImagesList = []; }
            if (!carouselImagesList.length) {
                carouselImagesList = ['https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200'];
            }
        }
        function parseLinksCarousel() {
            try {
                if (typeof siteSettings.linksCarousel === 'string') {
                    linksCarouselList = JSON.parse(siteSettings.linksCarousel);
                } else if (Array.isArray(siteSettings.linksCarousel)) {
                    linksCarouselList = siteSettings.linksCarousel;
                } else { linksCarouselList = []; }
            } catch(e) { linksCarouselList = []; }
            if (!linksCarouselList.length) {
                linksCarouselList = [
                    {image: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=600', url: 'https://www.binance.com'},
                    {image: 'https://images.unsplash.com/photo-1622630998477-20aa696ecb05?w=600', url: 'https://www.coinbase.com'},
                    {image: 'https://images.unsplash.com/photo-1605792657660-596af9009e82?w=600', url: 'https://www.tradingview.com'},
                    {image: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=600', url: 'https://www.coingecko.com'}
                ];
            }
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function applyTheme(settings) {
            if (!settings) return;
            document.documentElement.style.setProperty('--primary-color', settings.primaryColor);
            document.body.style.backgroundColor = settings.backgroundColor;
            document.body.style.color = settings.textColor;
        }
        function getLocalizedText(field) {
            let val = siteSettings[field];
            if (currentLanguage === 'en' && siteSettings[field + '_en']) val = siteSettings[field + '_en'];
            return escapeHtml(val);
        }
        function getDisclaimerText() {
            if (currentLanguage === 'en' && siteSettings.disclaimerText_en) return escapeHtml(siteSettings.disclaimerText_en);
            return escapeHtml(siteSettings.disclaimerText);
        }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                parseCarouselImages();
                parseLinksCarousel();
                applyTheme(siteSettings);
                renderCurrentView();
            });
            if (packagesUnsubscribe) packagesUnsubscribe();
            const q = query(collection(db, "packages"), orderBy("order", "asc"));
            packagesUnsubscribe = onSnapshot(q, (snapshot) => {
                packagesList = [];
                snapshot.forEach(doc => packagesList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
            if (announcementsUnsubscribe) announcementsUnsubscribe();
            const announcementsQuery = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
            announcementsUnsubscribe = onSnapshot(announcementsQuery, (snapshot) => {
                announcementsList = [];
                snapshot.forEach(doc => announcementsList.push({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
        }

        let currentPage = 'home';
        let mainCarouselInterval = null;
        let linksCarouselInterval = null;
        let currentMainSlide = 0;
        let currentLinksSlide = 0;

        function setPage(page) { currentPage = page; window.location.hash = page; renderCurrentView(); }
        function getPageFromHash() { let hash = window.location.hash.substring(1); if (['home','education','mentor','community','pricing','contact'].includes(hash)) return hash; return 'home'; }
        window.addEventListener('hashchange', () => { if (currentMode === 'user') { currentPage = getPageFromHash(); renderCurrentView(); } });

        function initMainCarousel() {
            if (mainCarouselInterval) clearInterval(mainCarouselInterval);
            const slidesContainer = document.getElementById('mainCarouselSlides');
            const dotsContainer = document.getElementById('mainCarouselDots');
            if (!slidesContainer || !dotsContainer || carouselImagesList.length === 0) return;
            slidesContainer.innerHTML = '';
            carouselImagesList.forEach((imgUrl, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'carousel-slide';
                slideDiv.innerHTML = `<img src="${escapeHtml(imgUrl)}" alt="Slide ${idx+1}" onerror="this.src='https://via.placeholder.com/1200x400?text=Image+Not+Found'">`;
                slidesContainer.appendChild(slideDiv);
            });
            dotsContainer.innerHTML = '';
            carouselImagesList.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToMainSlide(idx));
                dotsContainer.appendChild(dot);
            });
            function goToMainSlide(index) {
                currentMainSlide = index;
                slidesContainer.style.transform = `translateX(-${currentMainSlide * 100}%)`;
                document.querySelectorAll('#mainCarouselDots .carousel-dot').forEach((dot, i) => {
                    if (i === currentMainSlide) dot.classList.add('active');
                    else dot.classList.remove('active');
                });
            }
            window.goToMainSlide = goToMainSlide;
            mainCarouselInterval = setInterval(() => {
                if (carouselImagesList.length > 0) {
                    currentMainSlide = (currentMainSlide + 1) % carouselImagesList.length;
                    goToMainSlide(currentMainSlide);
                }
            }, 5000);
            goToMainSlide(0);
        }

        function initLinksCarousel() {
            if (linksCarouselInterval) clearInterval(linksCarouselInterval);
            const slidesContainer = document.getElementById('linksCarouselSlides');
            const dotsContainer = document.getElementById('linksCarouselDots');
            if (!slidesContainer || !dotsContainer || linksCarouselList.length === 0) return;
            slidesContainer.innerHTML = '';
            linksCarouselList.forEach((item, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'small-carousel-slide';
                slideDiv.innerHTML = `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer"><img src="${escapeHtml(item.image)}" alt="Link ${idx+1}" onerror="this.src='https://via.placeholder.com/600x180?text=Link+${idx+1}'"></a>`;
                slidesContainer.appendChild(slideDiv);
            });
            dotsContainer.innerHTML = '';
            linksCarouselList.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `small-carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToLinksSlide(idx));
                dotsContainer.appendChild(dot);
            });
            function goToLinksSlide(index) {
                currentLinksSlide = index;
                slidesContainer.style.transform = `translateX(-${currentLinksSlide * 100}%)`;
                document.querySelectorAll('#linksCarouselDots .small-carousel-dot').forEach((dot, i) => {
                    if (i === currentLinksSlide) dot.classList.add('active');
                    else dot.classList.remove('active');
                });
            }
            window.goToLinksSlide = goToLinksSlide;
            linksCarouselInterval = setInterval(() => {
                if (linksCarouselList.length > 0) {
                    currentLinksSlide = (currentLinksSlide + 1) % linksCarouselList.length;
                    goToLinksSlide(currentLinksSlide);
                }
            }, 5000);
            goToLinksSlide(0);
        }

        // ---------- USER PAGE RENDERING (unchanged but references carousels) ----------
        function renderHomePage(primary) {
            const announcementsHtml = (() => {
                const active = announcementsList.filter(a => a.active !== false);
                if (!active.length) return `<div class="text-center text-gray-400 py-8"><i class="fas fa-newspaper"></i> ${t('noAnnouncements')}</div>`;
                return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${active.map(ann => {
                    let title = ann.title, content = ann.content;
                    if (currentLanguage === 'en' && ann.title_en) title = ann.title_en;
                    if (currentLanguage === 'en' && ann.content_en) content = ann.content_en;
                    return `<div class="announcement-card glass-card p-5 rounded-xl" style="background: rgba(0,0,0,0.35); border-left: 3px solid ${primary};"><div class="flex items-start justify-between"><h3 class="text-xl font-bold mb-2" style="color:${primary}">${escapeHtml(title)}</h3><span class="text-xs text-gray-400">${ann.createdAt ? new Date(ann.createdAt).toLocaleDateString() : ''}</span></div><p class="text-gray-200 text-sm leading-relaxed">${escapeHtml(content)}</p>${ann.link ? `<a href="${escapeHtml(ann.link)}" target="_blank" class="inline-block mt-3 text-xs font-semibold" style="color:${primary}"><i class="fas fa-external-link-alt"></i> ${currentLanguage === 'en' ? 'Learn more' : 'Μάθετε περισσότερα'}</a>` : ''}</div>` }).join('')}</div>`;
            })();
            return `
                <div class="relative overflow-hidden pt-8 pb-8">
                    <div class="absolute inset-0 hero-gradient opacity-40"></div>
                    <div class="container mx-auto px-6 relative z-10">
                        <div class="flex flex-col lg:flex-row items-center gap-12">
                            <div class="flex-1 text-center lg:text-left">
                                <h1 class="text-5xl md:text-6xl font-extrabold mb-4">${getLocalizedText('heroTitle')}</h1>
                                <p class="text-xl text-gray-300 max-w-xl mx-auto lg:mx-0 mb-8">${getLocalizedText('heroSubtitle')}</p>
                                <a href="#pricing" class="px-6 py-3 rounded-full font-bold btn-glow inline-block" style="background:${primary}; color:#fff;">${t('explorePackages')}</a>
                            </div>
                            <div class="flex-1">
                                <div class="carousel-container">
                                    <div id="mainCarouselSlides" class="carousel-slides"></div>

        // Image editor helper: create zoomable preview with drag handle
        function renderImageEditor(items, type, onReorder, onUpdateItem) {
            const container = document.createElement('div');
            container.className = 'space-y-3';
            items.forEach((item, idx) => {
                const imgUrl = type === 'main' ? item : item.image;
                const urlValue = type === 'main' ? item : item.url;
                const div = document.createElement('div');
                div.className = 'image-editor-item bg-gray-800 rounded-xl p-3 flex flex-col md:flex-row items-center gap-4';
                div.setAttribute('data-idx', idx);
                div.innerHTML = `
                    <div class="sortable-handle cursor-grab"><i class="fas fa-grip-vertical text-gray-400"></i></div>
                    <div class="image-preview-container relative">
                        <img src="${escapeHtml(imgUrl)}" class="preview-img w-32 h-24 object-cover rounded-lg" style="transform: scale(1);" onerror="this.src='https://via.placeholder.com/128x96?text=Error'">
                        <div class="zoom-controls">
                            <button class="zoom-in" data-idx="${idx}" data-type="${type}"><i class="fas fa-search-plus"></i></button>
                            <button class="zoom-out" data-idx="${idx}" data-type="${type}"><i class="fas fa-search-minus"></i></button>
                        </div>
                    </div>
                    <div class="flex-1 w-full">
                        <input type="text" class="image-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(imgUrl)}" placeholder="Image URL">
                        ${type === 'links' ? `<input type="text" class="link-url w-full p-2 mt-2 rounded bg-gray-700 text-sm" value="${escapeHtml(urlValue)}" placeholder="Link URL (https://...)">` : ''}
                        <button class="delete-item mt-2 bg-red-600 text-xs px-3 py-1 rounded"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
            // Add new item button
            const addBtn = document.createElement('button');
            addBtn.className = 'mt-3 bg-emerald-600 text-sm px-4 py-2 rounded-lg w-full md:w-auto';
            addBtn.innerHTML = `<i class="fas fa-plus"></i> Add New ${type === 'main' ? 'Image' : 'Link'}`;
            addBtn.onclick = () => {
                const newItem = type === 'main' ? 'https://via.placeholder.com/1200x400?text=New+Image' : { image: 'https://via.placeholder.com/600x180?text=New+Link', url: 'https://' };
                const newList = [...items, newItem];
                onReorder(newList);
            };
            container.appendChild(addBtn);
            
            // Attach event listeners
            container.querySelectorAll('.zoom-in').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                    let currentScale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                    currentScale = Math.min(currentScale + 0.2, 3);
                    img.style.transform = `scale(${currentScale})`;
                });
            });
            container.querySelectorAll('.zoom-out').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    const img = btn.closest('.image-preview-container').querySelector('.preview-img');
                    let currentScale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                    currentScale = Math.max(currentScale - 0.2, 0.5);
                    img.style.transform = `scale(${currentScale})`;
                });
            });
            container.querySelectorAll('.image-url').forEach((input, i) => {
                input.addEventListener('change', () => {
                    const newList = [...items];
                    if (type === 'main') newList[i] = input.value;
                    else newList[i] = { ...newList[i], image: input.value };
                    onUpdateItem(newList);
                });
            });
            if (type === 'links') {
                container.querySelectorAll('.link-url').forEach((input, i) => {
                    input.addEventListener('change', () => {
                        const newList = [...items];
                        newList[i] = { ...newList[i], url: input.value };
                        onUpdateItem(newList);
                    });
                });
            }
            container.querySelectorAll('.delete-item').forEach((btn, i) => {
                btn.addEventListener('click', () => {
                    const newList = items.filter((_, idx) => idx !== i);
                    onReorder(newList);
                });
            });
            return container;
        }

                linksEditorContainer.innerHTML = '';
                linksEditorContainer.appendChild(editor);
                if (window.sortable) window.sortable(linksEditorContainer, { items: '.image-editor-item', handle: '.sortable-handle', onDrop: () => {
                    const newItems = [];
                    linksEditorContainer.querySelectorAll('.image-editor-item').forEach(el => {
                        const imgUrl = el.querySelector('.image-url').value;
                        const linkUrl = el.querySelector('.link-url')?.value || '';
                        newItems.push({ image: imgUrl, url: linkUrl });
                    });
                    linksCarouselList = newItems;
                    updateCarousels();
                }});
            }
            
            function updateCarousels() {
                // Update global arrays and save to Firebase
                const updated = {
                    carouselImages: JSON.stringify(carouselImagesList),
                    linksCarousel: JSON.stringify(linksCarouselList)
                };
                updateDoc(doc(db, "settings", "siteConfig"), updated).catch(console.error);
                // Also update other settings
                const otherSettings = {
                    primaryColor: document.getElementById('primaryColor').value,
                    backgroundColor: document.getElementById('backgroundColor').value,
                    logoUrl: document.getElementById('logoUrl').value,
                    footerText: document.getElementById('footerText').value,
                    contactEmail: document.getElementById('contactEmail').value,
                    contactPhone: document.getElementById('contactPhone').value,
                    contactAddress: document.getElementById('contactAddress').value,
                    heroTitle: document.getElementById('heroTitle').value,
                    heroTitle_en: document.getElementById('heroTitle_en').value,
                    heroSubtitle: document.getElementById('heroSubtitle').value,
                    heroSubtitle_en: document.getElementById('heroSubtitle_en').value,
                    homeContent: document.getElementById('homeContent').value,
                    homeContent_en: document.getElementById('homeContent_en').value,
                    disclaimerText: document.getElementById('disclaimerText').value,
                    disclaimerText_en: document.getElementById('disclaimerText_en').value
                };
                updateDoc(doc(db, "settings", "siteConfig"), otherSettings).catch(console.error);
                const msgDiv = document.getElementById('settingsMsg') || (()=>{const d=document.createElement('div'); d.id='settingsMsg'; d.className='mt-3 text-green-400'; container.appendChild(d); return d;})();
                if(msgDiv) { msgDiv.innerText = "✅ Settings and images saved!"; setTimeout(()=>msgDiv.innerText="",2000); }
            }
            
            refreshMainEditor();
            refreshLinksEditor();
            
            // Add save button for other settings
            const saveBtn = document.createElement('button');
            saveBtn.className = 'mt-6 px-6 py-2 rounded-full font-bold';
            saveBtn.style.background = '#f7931a';
            saveBtn.style.color = '#000';
            saveBtn.innerText = 'Save All Settings (excluding images - auto-saved)';
            saveBtn.onclick = async () => {
                const otherSettings = {
                    primaryColor: document.getElementById('primaryColor').value,
                    backgroundColor: document.getElementById('backgroundColor').value,
                    logoUrl: document.getElementById('logoUrl').value,
                    footerText: document.getElementById('footerText').value,
                    contactEmail: document.getElementById('contactEmail').value,
                    contactPhone: document.getElementById('contactPhone').value,
                    contactAddress: document.getElementById('contactAddress').value,
                    heroTitle: document.getElementById('heroTitle').value,
                    heroTitle_en: document.getElementById('heroTitle_en').value,
                    heroSubtitle: document.getElementById('heroSubtitle').value,
                    heroSubtitle_en: document.getElementById('heroSubtitle_en').value,
                    homeContent: document.getElementById('homeContent').value,
                    homeContent_en: document.getElementById('homeContent_en').value,
                    disclaimerText: document.getElementById('disclaimerText').value,
                    disclaimerText_en: document.getElementById('disclaimerText_en').value,
                    carouselImages: JSON.stringify(carouselImagesList),
                    linksCarousel: JSON.stringify(linksCarouselList)
                };
                await updateDoc(doc(db, "settings", "siteConfig"), otherSettings);
                const msgDiv = document.getElementById('settingsMsg') || (()=>{const d=document.createElement('div'); d.id='settingsMsg'; d.className='mt-3 text-green-400'; container.appendChild(d); return d;})();
                msgDiv.innerText = "✅ All settings saved!";
                setTimeout(()=>msgDiv.innerText="",2000);
            };
            container.appendChild(saveBtn);
            const msgDiv = document.createElement('div');
            msgDiv.id = 'settingsMsg';
            msgDiv.className = 'mt-3 text-green-400';
            container.appendChild(msgDiv);
        }
        
        async function renderPackagesTab() { const container = document.getElementById('adminTabContent'); const pkgHtml = packagesList.map(p => `<div class="flex justify-between items-center border-b py-2"><div><strong>${escapeHtml(p.name)}</strong> / ${escapeHtml(p.name_en||'')}<br><span class="text-xs">${escapeHtml(p.price)}</span></div><div><button onclick="window.editPackage('${p.id}')" class="bg-blue-600 px-2 py-1 rounded text-sm">Edit</button> <button onclick="window.deletePackageItem('${p.id}')" class="bg-red-600 px-2 py-1 rounded text-sm">Del</button></div></div>`).join(''); container.innerHTML = `<h3 class="text-xl font-bold">Packages</h3><button id="newPackageBtn" class="mb-3 bg-emerald-600 px-3 py-1 rounded">+ New</button><div>${pkgHtml||'None'}</div>`; document.getElementById('newPackageBtn').onclick = () => showPackageForm(); window.editPackage = (id) => showPackageForm(packagesList.find(p=>p.id===id)); window.deletePackageItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db,"packages",id)); }; }
        async function showPackageForm(existing=null) { const modalDiv = document.createElement('div'); modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4"; modalDiv.innerHTML = `<div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-2xl"><h3 class="text-xl font-bold">${existing?'Edit':'New'} Package</h3><div class="grid grid-cols-2 gap-3 mt-3"><div><label>Name (el)</label><input id="pkgName" value="${existing?escapeHtml(existing.name):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Name (en)</label><input id="pkgName_en" value="${existing?escapeHtml(existing.name_en||''):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Price</label><input id="pkgPrice" value="${existing?escapeHtml(existing.price):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Image URL</label><input id="pkgImage" value="${existing?escapeHtml(existing.imageUrl||''):''}" class="w-full p-2 rounded bg-gray-800"></div><div class="col-span-2"><label>Description (el)</label><textarea id="pkgDesc" rows="2" class="w-full p-2 rounded bg-gray-800">${existing?escapeHtml(existing.description||''):''}</textarea></div><div class="col-span-2"><label>Description (en)</label><textarea id="pkgDesc_en" rows="2" class="w-full p-2 rounded bg-gray-800">${existing?escapeHtml(existing.description_en||''):''}</textarea></div><div class="col-span-2"><label>Features (el) - comma</label><input id="pkgFeatures" value="${existing&&existing.features?existing.features.join(','):''}" class="w-full p-2 rounded bg-gray-800"></div><div class="col-span-2"><label>Features (en) - comma</label><input id="pkgFeatures_en" value="${existing&&existing.features_en?existing.features_en.join(','):''}" class="w-full p-2 rounded bg-gray-800"></div></div><div class="flex gap-3 mt-4"><button id="savePkgBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelPkgBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`; document.body.appendChild(modalDiv); modalDiv.querySelector('#savePkgBtn').onclick = async () => { const name = document.getElementById('pkgName').value.trim(); if(!name) return; const data = { name, name_en: document.getElementById('pkgName_en').value.trim(), price: document.getElementById('pkgPrice').value, description: document.getElementById('pkgDesc').value, description_en: document.getElementById('pkgDesc_en').value, imageUrl: document.getElementById('pkgImage').value, features: document.getElementById('pkgFeatures').value.split(',').map(f=>f.trim()), features_en: document.getElementById('pkgFeatures_en').value.split(',').map(f=>f.trim()), order: existing?existing.order:Date.now() }; if(existing) await updateDoc(doc(db,"packages",existing.id), data); else await addDoc(collection(db,"packages"), data); modalDiv.remove(); }; modalDiv.querySelector('#cancelPkgBtn').onclick = () => modalDiv.remove(); }
        async function renderLeadsTab() { const leadsSnap = await getDocs(query(collection(db,"leads"), orderBy("timestamp","desc"))); let html = `<h3 class="text-xl font-bold">Leads</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>Name</th><th>Email</th><th>Package</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>`; leadsSnap.forEach(d=>{ const data=d.data(); html+=`<tr><td class="py-2">${escapeHtml(data.name)}</td><td>${escapeHtml(data.email)}</td><td>${escapeHtml(data.packageName)}</td><td><button class="status-btn" data-id="${d.id}" data-status="✅">✅</button><button class="status-btn" data-id="${d.id}" data-status="❌">❌</button><button class="status-btn" data-id="${d.id}" data-status="❔">❔</button> ${data.status||'❔'}</td><td class="text-xs">${new Date(data.timestamp).toLocaleString()}</td><td><button class="delete-lead text-red-400" data-id="${d.id}"><i class="fas fa-trash"></i></button></td></tr>`; }); html+=`</tbody></table></div>`; document.getElementById('adminTabContent').innerHTML=html; document.querySelectorAll('.status-btn').forEach(b=>b.onclick=async()=>{ await updateDoc(doc(db,"leads",b.dataset.id),{status:b.dataset.status}); renderLeadsTab(); }); document.querySelectorAll('.delete-lead').forEach(b=>b.onclick=async()=>{ if(confirm("Delete?")) await deleteDoc(doc(db,"leads",b.dataset.id)); renderLeadsTab(); }); }
        async function renderAnnouncementsTab() { const annHtml = announcementsList.map(a=>`<div class="border-b py-2"><strong>${escapeHtml(a.title)}</strong> / ${escapeHtml(a.title_en||'')} - ${a.active!==false?'Active':'Inactive'} <button onclick="window.editAnnouncement('${a.id}')" class="ml-2 bg-blue-600 px-2 rounded text-sm">Edit</button> <button onclick="window.deleteAnnouncementItem('${a.id}')" class="bg-red-600 px-2 rounded text-sm">Del</button></div>`).join(''); document.getElementById('adminTabContent').innerHTML=`<h3 class="text-xl font-bold">Announcements</h3><button id="newAnnBtn" class="mb-3 bg-emerald-600 px-3 py-1 rounded">+ New</button><div>${annHtml||'None'}</div>`; document.getElementById('newAnnBtn').onclick=()=>showAnnouncementForm(); window.editAnnouncement=(id)=>showAnnouncementForm(announcementsList.find(a=>a.id===id)); window.deleteAnnouncementItem=async(id)=>{ if(confirm("Delete?")) await deleteDoc(doc(db,"announcements",id)); renderAnnouncementsTab(); }; }
        async function showAnnouncementForm(existing=null) { const modalDiv = document.createElement('div'); modalDiv.innerHTML = `<div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-lg"><h3 class="text-xl font-bold">${existing?'Edit':'New'} Announcement</h3><div class="mt-3"><label>Title (el)</label><input id="annTitle" value="${existing?escapeHtml(existing.title):''}" class="w-full p-2 mb-2 rounded bg-gray-800"><label>Title (en)</label><input id="annTitle_en" value="${existing?escapeHtml(existing.title_en||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"><label>Content (el)</label><textarea id="annContent" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content):''}</textarea><label>Content (en)</label><textarea id="annContent_en" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content_en||''):''}</textarea><label>Link</label><input id="annLink" value="${existing?escapeHtml(existing.link||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"><label><input type="checkbox" id="annActive" ${existing&&existing.active===false?'':'checked'}> Active</label></div><div class="flex gap-3 mt-4"><button id="saveAnnBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelAnnBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`; modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4"; document.body.appendChild(modalDiv); modalDiv.querySelector('#saveAnnBtn').onclick = async () => { const data = { title: document.getElementById('annTitle').value, title_en: document.getElementById('annTitle_en').value, content: document.getElementById('annContent').value, content_en: document.getElementById('annContent_en').value, link: document.getElementById('annLink').value, active: document.getElementById('annActive').checked, updatedAt: new Date().toISOString(), createdAt: existing?existing.createdAt:new Date().toISOString() }; if(existing) await updateDoc(doc(db,"announcements",existing.id), data); else await addDoc(collection(db,"announcements"), data); modalDiv.remove(); renderAnnouncementsTab(); }; modalDiv.querySelector('#cancelAnnBtn').onclick = () => modalDiv.remove(); }
        async function renderContactMessagesTab() { const msgs = await getDocs(query(collection(db,"contactMessages"), orderBy("timestamp","desc"))); let html = `<h3 class="text-xl font-bold">Contact Messages</h3>`; msgs.forEach(d=>{ const m=d.data(); html+=`<div class="glass-card p-3 mb-2 rounded"><strong>${escapeHtml(m.name)}</strong> (${escapeHtml(m.email)})<br>${escapeHtml(m.message)}<br><button class="delete-msg bg-red-600 text-sm px-2 py-1 rounded mt-1" data-id="${d.id}">Delete</button></div>`; }); document.getElementById('adminTabContent').innerHTML=html; document.querySelectorAll('.delete-msg').forEach(b=>b.onclick=async()=>{ if(confirm("Delete?")) await deleteDoc(doc(db,"contactMessages",b.dataset.id)); renderContactMessagesTab(); }); }

        function renderCurrentView() {
            const root = document.getElementById('root');
            if (currentMode === 'user') {
                root.innerHTML = renderUserView();
                document.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); setPage(link.getAttribute('data-page')); }));
                document.getElementById('openAdminWindowBtn')?.addEventListener('click', () => { const url = new URL(window.location.href); url.searchParams.set('admin','true'); window.open(url.toString(), '_blank', 'width=1300,height=900'); });
                document.getElementById('langEl')?.addEventListener('click', () => { currentLanguage = 'el'; renderCurrentView(); });
                document.getElementById('langEn')?.addEventListener('click', () => { currentLanguage = 'en'; renderCurrentView(); });
                const contactForm = document.getElementById('contactForm');
                if(contactForm) contactForm.onsubmit = async (e) => { e.preventDefault(); const name = document.getElementById('contactName').value.trim(), email = document.getElementById('contactEmailInput').value.trim(), message = document.getElementById('contactMessage').value.trim(); if(!name||!email||!message) return alert("Fill all fields"); try { await addDoc(collection(db,"contactMessages"),{name,email,message,timestamp:new Date().toISOString()}); document.getElementById('contactFormMsg').innerText = "✅ Sent!"; contactForm.reset(); setTimeout(()=>document.getElementById('contactFormMsg').innerText="",3000); } catch(e){ alert("Error"); } };
                if (currentPage === 'home') { setTimeout(() => { initMainCarousel(); initLinksCarousel(); }, 100); }
            } else {
                if (mainCarouselInterval) clearInterval(mainCarouselInterval);
                if (linksCarouselInterval) clearInterval(linksCarouselInterval);
                root.innerHTML = renderAdminView();
                if (adminAuthorized) { setTimeout(()=>loadAdminDashboardLogic(),50); document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.reload(); }); document.getElementById('viewMainSiteBtn')?.addEventListener('click', () => { const mainUrl = new URL(window.location.href); mainUrl.searchParams.delete('admin'); window.open(mainUrl.toString(), '_blank'); }); }
                else { attachAdminAuthEvents(); }
            }
        }
        function attachAdminAuthEvents() { document.getElementById('adminLoginBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; try { const cred = await signInWithEmailAndPassword(auth, email, pwd); if(await checkAdminAuthorization(cred.user)) { adminAuthorized=true; renderCurrentView(); } else document.getElementById('adminAuthMsg').innerText="Not admin."; } catch(e){ document.getElementById('adminAuthMsg').innerText=e.message; } }); document.getElementById('adminRegisterBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; if(!email||!pwd) return; try { const userCred = await createUserWithEmailAndPassword(auth, email, pwd); const adminDocRef = doc(db,"admin","adminData"); const snap = await getDoc(adminDocRef); if(!snap.exists()) { await setDoc(adminDocRef, { adminUid: userCred.user.uid }); adminAuthorized=true; renderCurrentView(); } else alert("Admin already exists."); } catch(e){ alert(e.message); } }); }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMode = urlParams.get('admin') === 'true' ? 'admin' : 'user';
            await initRealtimeSync();
            if (currentMode === 'admin') onAuthStateChanged(auth, async (user) => { if (user) adminAuthorized = await checkAdminAuthorization(user); else adminAuthorized = false; renderCurrentView(); });
            else { currentPage = getPageFromHash(); renderCurrentView(); }
            setTimeout(() => { const ld = document.getElementById('loadingScreen'); if(ld) { ld.classList.add('fade-out'); setTimeout(()=>{if(ld&&ld.parentNode) ld.style.display='none';},800); } }, 3000);
        }
        init();
    </script>
