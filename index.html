<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TradeLegends | Crypto Education Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html5-sortable@0.11.0/dist/html5-sortable.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s ease, color 0.2s ease; margin: 0; overflow-x: hidden; }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/S7cgyHJ2/fcd9ca6e-d05e-497c-90a6-c833528f92d4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            backdrop-filter: brightness(0.7) blur(2px);
        }
        .loading-screen::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 31, 0.65); z-index: 1; }
        .loading-content { position: relative; z-index: 2; text-align: center; animation: pulseGlow 1.5s infinite ease-in-out; }
        .loading-logo { width: 180px; height: auto; border-radius: 32px; box-shadow: 0 0 30px rgba(247, 147, 26, 0.4); animation: floatLogo 2s infinite alternate; }
        .loading-text { margin-top: 24px; font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #f7931a, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
        .loading-dots span { display: inline-block; animation: dotBlink 1.4s infinite; font-size: 2rem; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulseGlow { 0% { transform: scale(0.98); opacity: 0.8; } 100% { transform: scale(1.02); opacity: 1; } }
        @keyframes floatLogo { 0% { transform: translateY(0px); } 100% { transform: translateY(-12px); } }
        @keyframes dotBlink { 0%, 20% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .loading-screen.fade-out { opacity: 0; visibility: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.15); }
        .package-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .package-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.3); }
        .btn-glow { transition: all 0.2s; }
        .btn-glow:hover { filter: brightness(1.05); box-shadow: 0 0 12px currentColor; }
        .hero-gradient { background: radial-gradient(circle at 10% 30%, rgba(0,255,255,0.08) 0%, rgba(0,0,0,0) 60%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #f0b90b; border-radius: 10px; }
        .nav-link { transition: all 0.2s; position: relative; cursor: pointer; }
        .nav-link:hover { opacity: 0.8; }
        .nav-link.active { font-weight: 700; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: currentColor; border-radius: 2px; }
        @media (max-width: 768px) { .nav-scroll { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; } .nav-flex { display: inline-flex; gap: 1.5rem; } }
        .page-transition { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lang-btn { transition: all 0.2s; cursor: pointer; }
        .lang-btn.active { font-weight: bold; text-decoration: underline; }
        .carousel-container { position: relative; overflow: hidden; border-radius: 1.5rem; box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5); }
        .carousel-slides { display: flex; transition: transform 0.5s ease-in-out; }
        .carousel-slide { flex: 0 0 100%; }
        .carousel-slide a { display: block; cursor: pointer; }
        .carousel-slide img { width: 100%; height: 400px; object-fit: cover; transition: transform 0.2s; }
        .carousel-slide img:hover { transform: scale(1.02); }
        .carousel-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; }
        .carousel-dot.active { background: white; transform: scale(1.2); }
        @media (max-width: 768px) { .carousel-slide img { height: 250px; } }
        .disclaimer-card { background: rgba(0,0,0,0.6); border-left: 4px solid #f7931a; font-size: 0.8rem; }
        .section-card-image { width: 100%; max-height: 200px; object-fit: cover; border-radius: 1rem; margin-bottom: 1rem; }
        .material-card { background: rgba(0,0,0,0.4); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; border-left: 3px solid var(--primary-color); }
    </style>
</head>
<body class="text-gray-200">
    <div id="loadingScreen" class="loading-screen"><div class="loading-content"><img src="https://i.ibb.co/Rp4NpbPL/Edit-the-existing-lo3.jpg" class="loading-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4664/4664838.png'"><div class="loading-text mt-4">TradeLegends</div><div class="loading-dots mt-2"><span>.</span><span>.</span><span>.</span></div><p class="text-gray-200 text-sm mt-4 font-medium">Loading premium content...</p></div></div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxtXsrp9kk0nHfuw53CQ-KUqVYukyRZqM",
            authDomain: "tradelegends-ee76e.firebaseapp.com",
            projectId: "tradelegends-ee76e",
            storageBucket: "tradelegends-ee76e.firebasestorage.app",
            messagingSenderId: "70719513507",
            appId: "1:70719513507:web:f9e6edb7cbedfe0a2c7016"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentMode = 'user';
        let adminAuthorized = false;
        let settingsUnsubscribe = null;
        let packagesUnsubscribe = null;
        let announcementsUnsubscribe = null;
        let subscriptionsUnsubscribe = null;
        let currentLanguage = 'el';
        let currentUser = null;
        let userSubscription = null; // { packageId, status }
        
        const translations = {
            el: { home: "Αρχική", education: "Εκπαίδευση", mentor: "Mentor", community: "Κοινότητα", pricing: "Τιμολόγηση", contact: "Επικοινωνία", adminPortal: "Admin Portal", explorePackages: "Εξερεύνηση Πακέτων", latestNews: "Τελευταία Νέα & Ανακοινώσεις", contactForm: "Φόρμα Επικοινωνίας", send: "Αποστολή Μηνύματος", name: "Ονοματεπώνυμο", email: "Email", message: "Το μήνυμά σας", contactInfo: "Στοιχεία Επικοινωνίας", selectPackage: "Επιλέξτε Πακέτο", oneTime: "εφάπαξ", loading: "Φόρτωση...", noAnnouncements: "Νέες ανακοινώσεις σύντομα...", disclaimer: "⚠️ Σημαντική Αποποίηση Ευθύνης", login: "Σύνδεση", register: "Εγγραφή", logout: "Αποσύνδεση", myMaterial: "Το Υλικό μου", pendingApproval: "Η αίτησή σας εκκρεμεί για έγκριση", approved: "Εγκεκριμένο!", goToMaterial: "Μετάβαση στο υλικό" },
            en: { home: "Home", education: "Education", mentor: "Mentor", community: "Community", pricing: "Pricing", contact: "Contact", adminPortal: "Admin Portal", explorePackages: "Explore Packages", latestNews: "Latest News & Announcements", contactForm: "Contact Form", send: "Send Message", name: "Full Name", email: "Email", message: "Your Message", contactInfo: "Contact Info", selectPackage: "Select Package", oneTime: "one-time", loading: "Loading...", noAnnouncements: "New announcements soon...", disclaimer: "⚠️ Risk Disclaimer", login: "Login", register: "Register", logout: "Logout", myMaterial: "My Material", pendingApproval: "Your request is pending approval", approved: "Approved!", goToMaterial: "Go to Material" }
        };
        function t(key) { return translations[currentLanguage][key] || key; }

        let siteSettings = {
            primaryColor: '#f7931a', backgroundColor: '#0a0a1f', textColor: '#f0f0f0',
            logoUrl: 'https://cdn-icons-png.flaticon.com/512/4664/4664838.png',
            footerText: '© 2025 TradeLegends — Empowering Financial Freedom',
            heroTitle: 'Master Crypto & Financial Markets', heroSubtitle: 'Learn to trade like a legend',
            heroTitle_en: 'Master Crypto & Financial Markets', heroSubtitle_en: 'Learn to trade like a legend',
            homeContent: 'Καλώς ήρθατε στο TradeLegends!', homeContent_en: 'Welcome to TradeLegends!',
            homeImage: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', homeLink: '',
            educationContent: 'Ανακαλύψτε τα βασικά και προχωρημένα θέματα.', educationContent_en: 'Discover basic and advanced topics.',
            educationImage: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800', educationLink: '',
            mentorContent: 'Επαγγελματίες traders με χρόνια εμπειρίας.', mentorContent_en: 'Professional traders with years of experience.',
            mentorImage: 'https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=800', mentorLink: '',
            communityContent: 'Αποκλειστική κοινότητα φιλόδοξων επενδυτών.', communityContent_en: 'Exclusive community of ambitious investors.',
            communityImage: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=800', communityLink: '',
            pricingContent: 'Επιλέξτε το πρόγραμμα που ταιριάζει στους στόχους σας.', pricingContent_en: 'Choose the program that fits your goals.',
            pricingImage: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', pricingLink: '',
            contactEmail: 'support@tradelegends.com', contactPhone: '+30 210 1234567', contactAddress: 'Αθήνα, Ελλάδα',
            mainCarousel: '[{"image":"https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200","link":"https://www.binance.com"},{"image":"https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=1200","link":"https://www.coinbase.com"}]',
            disclaimerText: '⚠️ ΠΡΟΣΟΧΗ: Οι επενδύσεις σε κρύπτο ενέχουν υψηλό κίνδυνο.', disclaimerText_en: '⚠️ WARNING: Crypto investments involve high risk.'
        };
        
        let packagesList = [];
        let announcementsList = [];
        let mainCarouselList = [];

        function parseMainCarousel() {
            try { mainCarouselList = JSON.parse(siteSettings.mainCarousel); } catch(e) { mainCarouselList = []; }
            if (!mainCarouselList.length) mainCarouselList = [{image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200', link: ''}];
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function applyTheme(s) { document.body.style.backgroundColor = s.backgroundColor; document.body.style.color = s.textColor; }
        function getLocalizedField(field) { let val = siteSettings[field]; if (currentLanguage === 'en' && siteSettings[field + '_en']) val = siteSettings[field + '_en']; return escapeHtml(val); }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                parseMainCarousel();
                applyTheme(siteSettings);
                renderCurrentView();
            });
            if (packagesUnsubscribe) packagesUnsubscribe();
            packagesUnsubscribe = onSnapshot(query(collection(db, "packages"), orderBy("order", "asc")), (snapshot) => {
                packagesList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
            if (announcementsUnsubscribe) announcementsUnsubscribe();
            announcementsUnsubscribe = onSnapshot(query(collection(db, "announcements"), orderBy("createdAt", "desc")), (snapshot) => {
                announcementsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
        }

        let currentPage = 'home';
        let mainCarouselInterval = null;
        let currentMainSlide = 0;

        function setPage(page) { currentPage = page; window.location.hash = page; renderCurrentView(); }
        function getPageFromHash() { let hash = window.location.hash.substring(1); return ['home','education','mentor','community','pricing','contact','material'].includes(hash) ? hash : 'home'; }
        window.addEventListener('hashchange', () => { if (currentMode === 'user') { currentPage = getPageFromHash(); renderCurrentView(); } });

        function initMainCarousel() {
            if (mainCarouselInterval) clearInterval(mainCarouselInterval);
            const slides = document.getElementById('mainCarouselSlides');
            const dots = document.getElementById('mainCarouselDots');
            if (!slides || !dots || !mainCarouselList.length) return;
            slides.innerHTML = '';
            mainCarouselList.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'carousel-slide';
                const img = `<img src="${escapeHtml(item.image)}" onerror="this.src='https://via.placeholder.com/1200x400'">`;
                div.innerHTML = item.link ? `<a href="${escapeHtml(item.link)}" target="_blank">${img}</a>` : img;
                slides.appendChild(div);
            });
            dots.innerHTML = '';
            mainCarouselList.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.onclick = () => goToSlide(idx);
                dots.appendChild(dot);
            });
            function goToSlide(idx) {
                currentMainSlide = idx;
                slides.style.transform = `translateX(-${idx * 100}%)`;
                document.querySelectorAll('#mainCarouselDots .carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            }
            mainCarouselInterval = setInterval(() => { if (mainCarouselList.length) goToSlide((currentMainSlide + 1) % mainCarouselList.length); }, 5000);
            goToSlide(0);
        }

        function renderSectionCard(content, img, link, primary) {
            const imgHtml = img ? `<img src="${escapeHtml(img)}" class="section-card-image" onerror="this.src='https://via.placeholder.com/800x200'">` : '';
            const contentHtml = `<p class="text-lg leading-relaxed">${content}</p>`;
            if (link && link.trim()) return `<a href="${escapeHtml(link)}" target="_blank" class="block glass-card p-8 rounded-2xl transition hover:scale-[1.01]" style="background: rgba(0,0,0,0.3); border: 1px solid ${primary}40;">${imgHtml}${contentHtml}</a>`;
            return `<div class="glass-card p-8 rounded-2xl" style="background: rgba(0,0,0,0.3);">${imgHtml}${contentHtml}</div>`;
        }

        function renderHomePage(primary) {
            const announcementsHtml = announcementsList.filter(a => a.active !== false).length ? 
                `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${announcementsList.filter(a => a.active !== false).map(ann => {
                    let title = ann.title, content = ann.content;
                    if (currentLanguage === 'en' && ann.title_en) title = ann.title_en;
                    if (currentLanguage === 'en' && ann.content_en) content = ann.content_en;
                    return `<div class="glass-card p-5 rounded-xl" style="border-left: 3px solid ${primary};"><h3 class="text-xl font-bold mb-2" style="color:${primary}">${escapeHtml(title)}</h3><p class="text-gray-200 text-sm">${escapeHtml(content)}</p>${ann.link ? `<a href="${escapeHtml(ann.link)}" target="_blank" class="inline-block mt-3 text-xs" style="color:${primary}">Learn more →</a>` : ''}</div>`;
                }).join('')}</div>` : `<div class="text-center text-gray-400 py-8">${t('noAnnouncements')}</div>`;
            return `
                <div class="relative overflow-hidden pt-8 pb-8">
                    <div class="absolute inset-0 hero-gradient opacity-40"></div>
                    <div class="container mx-auto px-6 relative z-10">
                        <div class="flex flex-col lg:flex-row items-center gap-12">
                            <div class="flex-1 text-center lg:text-left">
                                <h1 class="text-5xl md:text-6xl font-extrabold mb-4">${getLocalizedField('heroTitle')}</h1>
                                <p class="text-xl text-gray-300 mb-8">${getLocalizedField('heroSubtitle')}</p>
                                <a href="#pricing" class="px-6 py-3 rounded-full font-bold btn-glow inline-block" style="background:${primary}; color:#fff;">${t('explorePackages')}</a>
                            </div>
                            <div class="flex-1"><div class="carousel-container"><div id="mainCarouselSlides" class="carousel-slides"></div><div id="mainCarouselDots" class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-10"></div></div></div>
                        </div>
                    </div>
                </div>
                <div class="container mx-auto px-6 py-12"><div class="max-w-4xl mx-auto">${renderSectionCard(getLocalizedField('homeContent'), getLocalizedField('homeImage'), getLocalizedField('homeLink'), primary)}</div></div>
                <div class="container mx-auto px-6 pb-8"><div class="disclaimer-card glass-card p-4 rounded-xl max-w-3xl mx-auto flex items-start gap-3" style="border-left-color: ${primary};"><i class="fas fa-exclamation-triangle text-xl" style="color:${primary}"></i><div><h4 class="font-bold text-sm" style="color:${primary}">${t('disclaimer')}</h4><p class="text-xs text-gray-300">${currentLanguage === 'en' ? escapeHtml(siteSettings.disclaimerText_en) : escapeHtml(siteSettings.disclaimerText)}</p></div></div></div>
                <div class="container mx-auto px-6 py-12 border-t border-white/10"><div class="flex items-center gap-3 justify-center mb-8"><i class="fas fa-bullhorn text-3xl" style="color:${primary}"></i><h2 class="text-3xl font-bold">${t('latestNews')}</h2></div>${announcementsHtml}</div>
            `;
        }
        
        function renderEducationPage(primary) { return `<div class="container mx-auto px-6 py-20"><div class="text-center mb-10"><i class="fas fa-graduation-cap text-5xl mb-4" style="color:${primary}"></i><h1 class="text-4xl font-bold">${t('education')}</h1></div><div class="max-w-4xl mx-auto">${renderSectionCard(getLocalizedField('educationContent'), getLocalizedField('educationImage'), getLocalizedField('educationLink'), primary)}</div></div>`; }
        function renderMentorPage(primary) { return `<div class="container mx-auto px-6 py-20"><div class="text-center mb-10"><i class="fas fa-chalkboard-user text-5xl mb-4" style="color:${primary}"></i><h1 class="text-4xl font-bold">${t('mentor')}</h1></div><div class="max-w-4xl mx-auto">${renderSectionCard(getLocalizedField('mentorContent'), getLocalizedField('mentorImage'), getLocalizedField('mentorLink'), primary)}</div></div>`; }
        function renderCommunityPage(primary) { return `<div class="container mx-auto px-6 py-20"><div class="text-center mb-10"><i class="fas fa-users text-5xl mb-4" style="color:${primary}"></i><h1 class="text-4xl font-bold">${t('community')}</h1></div><div class="max-w-4xl mx-auto">${renderSectionCard(getLocalizedField('communityContent'), getLocalizedField('communityImage'), getLocalizedField('communityLink'), primary)}</div></div>`; }
        
        function renderPricingPage(primary) {
            const packagesHtml = packagesList.map(pkg => {
                let name = pkg.name, description = pkg.description || '', features = pkg.features || [];
                if (currentLanguage === 'en') { if (pkg.name_en) name = pkg.name_en; if (pkg.description_en) description = pkg.description_en; if (pkg.features_en) features = pkg.features_en; }
                return `<div class="package-card glass-card p-6 rounded-2xl flex flex-col" style="border-left: 4px solid ${primary};">
                    ${pkg.imageUrl ? `<img src="${pkg.imageUrl}" class="w-full h-44 object-cover rounded-xl mb-4">` : `<div class="w-full h-44 bg-gray-800 rounded-xl mb-4 flex items-center justify-center"><i class="fas fa-coins text-4xl" style="color:${primary}"></i></div>`}
                    <h3 class="text-2xl font-bold mb-2">${escapeHtml(name)}</h3>
                    <p class="text-gray-300 text-sm mb-3 flex-grow">${escapeHtml(description)}</p>
                    <div class="flex items-baseline gap-2 mb-3"><span class="text-3xl font-black" style="color:${primary}">${escapeHtml(pkg.price || '€199')}</span><span class="text-sm text-gray-400">${t('oneTime')}</span></div>
                    <div class="mb-4 text-xs text-gray-300">${features.map(f => `<span class="inline-block mr-2"><i class="fas fa-check-circle" style="color:${primary}"></i> ${escapeHtml(f)}</span>`).join('')}</div>
                    <button onclick="window.requestPackage('${pkg.id}', '${escapeHtml(name).replace(/'/g, "\\'")}')" class="mt-3 py-2 px-4 rounded-full font-bold btn-glow" style="background:${primary}; color:#fff;">${t('selectPackage')} →</button>
                </div>`;
            }).join('');
            const pricingCard = renderSectionCard(getLocalizedField('pricingContent'), getLocalizedField('pricingImage'), getLocalizedField('pricingLink'), primary);
            return `<div class="container mx-auto px-6 py-20"><div class="text-center mb-8"><h1 class="text-4xl font-bold">${t('pricing')}</h1></div><div class="max-w-4xl mx-auto mb-12">${pricingCard}</div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">${packagesList.length ? packagesHtml : `<div class="col-span-full text-center py-12">${t('loading')}</div>`}</div></div>`;
        }
        
        function renderContactPage(primary) {

            `;

        window.requestPackage = async (packageId, packageName) => {
            if (!currentUser) {
                document.getElementById('showAuthModalBtn')?.click();
                alert(currentLanguage === 'en' ? 'Please login first' : 'Πρώτα συνδεθείτε');
                return;
            }
            const existing = await getDocs(query(collection(db, "subscriptions"), where("userId", "==", currentUser.uid), where("packageId", "==", packageId)));
            if (!existing.empty) {
                alert(currentLanguage === 'en' ? 'You already requested this package' : 'Έχετε ήδη αιτηθεί αυτό το πακέτο');
                return;
            }
            await addDoc(collection(db, "subscriptions"), {
                userId: currentUser.uid, userEmail: currentUser.email, packageId, packageName,
                status: "pending", requestedAt: new Date().toISOString()
            });
            alert(currentLanguage === 'en' ? `Request sent for ${packageName}. Wait for admin approval.` : `Αίτηση για ${packageName} στάλθηκε. Περιμένετε έγκριση.`);
            await loadUserSubscription();
        };

        async function loadUserSubscription() {
            if (!currentUser) { userSubscription = null; return; }
            const q = query(collection(db, "subscriptions"), where("userId", "==", currentUser.uid), where("status", "==", "approved"));
            const snap = await getDocs(q);
            if (!snap.empty) userSubscription = { id: snap.docs[0].id, ...snap.docs[0].data() };
            else userSubscription = null;
            if (currentPage === 'material') renderCurrentView();
        }

        // ADMIN VIEW (simplified but includes Subscriptions tab)

        function renderAdminLogin() { return `<div class="min-h-screen flex items-center justify-center p-5" style="background:#0a0a14;"><div class="glass-card max-w-md w-full p-8 rounded-2xl"><div class="text-center mb-6"><i class="fas fa-shield-alt text-5xl" style="color:#f7931a"></i><h2 class="text-2xl font-bold mt-2">Admin Auth</h2></div><div id="adminAuthForm"><input type="email" id="adminEmail" placeholder="Email" class="w-full mb-3 p-3 rounded-lg bg-gray-800"><input type="password" id="adminPassword" placeholder="Password" class="w-full mb-4 p-3 rounded-lg bg-gray-800"><button id="adminLoginBtn" class="w-full py-2 rounded-full font-bold mb-2" style="background:#f7931a; color:#000">Login</button><button id="adminRegisterBtn" class="w-full py-2 rounded-full border border-gray-500">Register (Admin)</button></div><div id="adminAuthMsg" class="text-red-400 text-sm mt-3 text-center"></div></div></div>`; }
        async function checkAdminAuthorization(user) { if (!user) return false; const adminDocRef = doc(db, "admin", "adminData"); const adminSnap = await getDoc(adminDocRef); if (adminSnap.exists() && adminSnap.data().adminUid === user.uid) return true; if (!adminSnap.exists()) { await setDoc(adminDocRef, { adminUid: user.uid }); return true; } return false; }
        
        function loadAdminDashboardLogic() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab','bg-white/10'));
                    btn.classList.add('active-tab','bg-white/10');
                    if(btn.dataset.tab === 'settings') renderAdminSettingsTab();
                    if(btn.dataset.tab === 'packages') renderAdminPackagesTab();
                    if(btn.dataset.tab === 'subscriptions') renderAdminSubscriptionsTab();
                    if(btn.dataset.tab === 'leads') renderAdminLeadsTab();
                    if(btn.dataset.tab === 'announcements') renderAdminAnnouncementsTab();
                    if(btn.dataset.tab === 'contacts') renderAdminContactsTab();
                };
            });
            renderAdminSettingsTab();
        }

        async function renderAdminSettingsTab() {
            const container = document.getElementById('adminTabContent');
            container.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4"><div><label>Primary Color</label><input type="color" id="primaryColor" value="${siteSettings.primaryColor}" class="w-full p-1 rounded"></div><div><label>Background Color</label><input type="color" id="backgroundColor" value="${siteSettings.backgroundColor}" class="w-full p-1 rounded"></div><div><label>Logo URL</label><input id="logoUrl" value="${escapeHtml(siteSettings.logoUrl)}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Footer Text</label><input id="footerText" value="${escapeHtml(siteSettings.footerText)}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Hero Title (el)</label><input id="heroTitle" value="${escapeHtml(siteSettings.heroTitle)}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Hero Title (en)</label><input id="heroTitle_en" value="${escapeHtml(siteSettings.heroTitle_en||'')}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Hero Subtitle (el)</label><input id="heroSubtitle" value="${escapeHtml(siteSettings.heroSubtitle)}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Hero Subtitle (en)</label><input id="heroSubtitle_en" value="${escapeHtml(siteSettings.heroSubtitle_en||'')}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Main Carousel JSON</label><textarea id="mainCarousel" rows="4" class="w-full p-2 rounded bg-gray-800 font-mono">${JSON.stringify(mainCarouselList)}</textarea></div></div><button id="saveSettingsBtn" class="mt-4 px-6 py-2 rounded-full font-bold" style="background:#f7931a; color:#000">Save Settings</button><div id="settingsMsg" class="mt-2 text-green-400"></div>`;
            document.getElementById('saveSettingsBtn').onclick = async () => {

                    heroSubtitle: document.getElementById('heroSubtitle').value, heroSubtitle_en: document.getElementById('heroSubtitle_en').value,

                setTimeout(()=>document.getElementById('settingsMsg').innerText="",2000);

                <div class="col-span-2"><label>Description (el)</label><textarea id="pkgDesc" rows="2" class="w-full p-2 rounded bg-gray-800">${existing?escapeHtml(existing.description||''):''}</textarea></div>

                <div class="col-span-2"><label>Features (en) - comma</label><input id="pkgFeatures_en" value="${existing&&existing.features_en?existing.features_en.join(','):''}" class="w-full p-2 rounded bg-gray-800"></div>

                <div class="col-span-2"><label>Material Videos (JSON: [{"title":"...","url":"...","embedCode":"..."}])</label><textarea id="materialVideos" rows="3" class="w-full p-2 rounded bg-gray-800 font-mono">${JSON.stringify(material.videos||[])}</textarea></div>
                </div><div class="flex gap-3 mt-4"><button id="savePkgBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelPkgBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`;
            document.body.appendChild(modalDiv);

                try { links = JSON.parse(document.getElementById('materialLinks').value); } catch(e){ links = []; }

        async function renderAdminSubscriptionsTab() {
            const container = document.getElementById('adminTabContent');
            const subsSnap = await getDocs(query(collection(db, "subscriptions"), orderBy("requestedAt", "desc")));
            let html = `<h3 class="text-xl font-bold mb-4">📋 Subscription Requests (Approve after payment)</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>Email</th><th>Package</th><th>Status</th><th>Requested</th><th>Actions</th></tr></thead><tbody>`;
            subsSnap.forEach(doc => {
                const s = doc.data();
                html += `<tr class="border-b"><td class="py-2">${escapeHtml(s.userEmail)}</td><td>${escapeHtml(s.packageName)}</td><td><span class="px-2 py-0.5 rounded-full text-xs ${s.status === 'approved' ? 'bg-green-600' : 'bg-yellow-600'}">${s.status}</span></td><td class="text-xs">${new Date(s.requestedAt).toLocaleDateString()}</td><td>${s.status !== 'approved' ? `<button class="approve-sub bg-green-600 px-2 py-1 rounded text-xs" data-id="${doc.id}">✅ Approve</button>` : ''} <button class="delete-sub bg-red-600 px-2 py-1 rounded text-xs" data-id="${doc.id}">🗑 Delete</button></td></tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
            document.querySelectorAll('.approve-sub').forEach(btn => btn.onclick = async () => {
                await updateDoc(doc(db, "subscriptions", btn.dataset.id), { status: "approved", approvedAt: new Date().toISOString() });

            });
            document.querySelectorAll('.delete-sub').forEach(btn => btn.onclick = async () => {
                if(confirm("Delete subscription?")) await deleteDoc(doc(db, "subscriptions", btn.dataset.id));
                renderAdminSubscriptionsTab();
            });
        }

            let html = `<h3 class="text-xl font-bold mb-4">Leads</h3><table class="w-full text-sm"><thead><tr><th>Name</th><th>Email</th><th>Package</th><th>Date</th></tr></thead><tbody>`;
            leads.forEach(d => { const data=d.data(); html+=`<tr><td>${escapeHtml(data.name)}</td><td>${escapeHtml(data.email)}</td><td>${escapeHtml(data.packageName)}</td><td class="text-xs">${new Date(data.timestamp).toLocaleString()}</td></tr>`; });
            html+=`</tbody></table><button id="clearLeadsBtn" class="mt-4 bg-red-600 px-3 py-1 rounded text-sm">Clear All Leads</button>`;
            document.getElementById('adminTabContent').innerHTML=html;
            document.getElementById('clearLeadsBtn')?.addEventListener('click', async () => { if(confirm("Delete ALL leads?")) { const all = await getDocs(collection(db,"leads")); all.forEach(d => deleteDoc(doc(db,"leads",d.id))); renderAdminLeadsTab(); } });
        }
        async function renderAdminAnnouncementsTab() {
            const annHtml = announcementsList.map(a => `<div class="border-b py-2"><strong>${escapeHtml(a.title)}</strong> / ${escapeHtml(a.title_en||'')} - ${a.active!==false?'Active':'Inactive'} <button onclick="window.editAnnouncementAdmin('${a.id}')" class="bg-blue-600 px-2 rounded text-sm">Edit</button> <button onclick="window.deleteAnnouncementAdmin('${a.id}')" class="bg-red-600 px-2 rounded text-sm">Del</button></div>`).join('');
            document.getElementById('adminTabContent').innerHTML = `<h3 class="text-xl font-bold">Announcements</h3><button id="newAnnBtn" class="mb-3 bg-emerald-600 px-3 py-1 rounded">+ New</button><div>${annHtml||'None'}</div>`;
            document.getElementById('newAnnBtn').onclick = () => showAnnouncementAdminForm();
            window.editAnnouncementAdmin = (id) => showAnnouncementAdminForm(announcementsList.find(a=>a.id===id));
            window.deleteAnnouncementAdmin = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db,"announcements",id)); renderAdminAnnouncementsTab(); };
        }
        async function showAnnouncementAdminForm(existing=null) {
            const modalDiv = document.createElement('div');
            modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4";
            modalDiv.innerHTML = `<div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-lg"><h3>${existing?'Edit':'New'} Announcement</h3><div><label>Title (el)</label><input id="annTitle" value="${existing?escapeHtml(existing.title):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label>Title (en)</label><input id="annTitle_en" value="${existing?escapeHtml(existing.title_en||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label>Content (el)</label><textarea id="annContent" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content):''}</textarea></div><div><label>Content (en)</label><textarea id="annContent_en" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content_en||''):''}</textarea></div><div><label>Link</label><input id="annLink" value="${existing?escapeHtml(existing.link||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label><input type="checkbox" id="annActive" ${existing&&existing.active===false?'':'checked'}> Active</label></div><div class="flex gap-3 mt-4"><button id="saveAnnBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelAnnBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`;
            document.body.appendChild(modalDiv);
            modalDiv.querySelector('#saveAnnBtn').onclick = async () => {
                const data = { title: document.getElementById('annTitle').value, title_en: document.getElementById('annTitle_en').value, content: document.getElementById('annContent').value, content_en: document.getElementById('annContent_en').value, link: document.getElementById('annLink').value, active: document.getElementById('annActive').checked, updatedAt: new Date().toISOString(), createdAt: existing?existing.createdAt:new Date().toISOString() };
                if(existing) await updateDoc(doc(db,"announcements",existing.id), data);
                else await addDoc(collection(db,"announcements"), data);
                modalDiv.remove();
                renderAdminAnnouncementsTab();
            };
            modalDiv.querySelector('#cancelAnnBtn').onclick = () => modalDiv.remove();
        }
        async function renderAdminContactsTab() {
            const msgs = await getDocs(query(collection(db,"contactMessages"), orderBy("timestamp","desc")));
            let html = `<h3 class="text-xl font-bold">Contact Messages</h3>`;
            msgs.forEach(d => { const m=d.data(); html+=`<div class="glass-card p-3 mb-2 rounded"><strong>${escapeHtml(m.name)}</strong> (${escapeHtml(m.email)})<br>${escapeHtml(m.message)}<br><button class="delete-msg bg-red-600 text-sm px-2 py-1 rounded mt-1" data-id="${d.id}">Delete</button></div>`; });
            document.getElementById('adminTabContent').innerHTML = html;
            document.querySelectorAll('.delete-msg').forEach(b=>b.onclick=async()=>{ if(confirm("Delete?")) await deleteDoc(doc(db,"contactMessages",b.dataset.id)); renderAdminContactsTab(); });
        }

        function renderCurrentView() {
            const root = document.getElementById('root');
            if (currentMode === 'user') {
                root.innerHTML = renderUserView();
                document.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); setPage(link.getAttribute('data-page')); }));
                document.getElementById('openAdminWindowBtn')?.addEventListener('click', () => { const url = new URL(window.location.href); url.searchParams.set('admin','true'); window.open(url.toString(), '_blank', 'width=1300,height=900'); });
                document.getElementById('langEl')?.addEventListener('click', () => { currentLanguage = 'el'; renderCurrentView(); });
                document.getElementById('langEn')?.addEventListener('click', () => { currentLanguage = 'en'; renderCurrentView(); });
                document.getElementById('showAuthModalBtn')?.addEventListener('click', () => document.getElementById('authModal').classList.remove('hidden'));
                document.getElementById('authLoginBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('authEmail').value, pwd = document.getElementById('authPassword').value;
                    try { await signInWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').classList.add('hidden'); await loadUserSubscription(); if(currentPage === 'material') renderCurrentView(); } 
                    catch(e) { document.getElementById('authMsg').innerText = e.message; }
                });
                document.getElementById('authRegisterBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('authEmail').value, pwd = document.getElementById('authPassword').value;
                    try { await createUserWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').classList.add('hidden'); await loadUserSubscription(); if(currentPage === 'material') renderCurrentView(); }
                    catch(e) { document.getElementById('authMsg').innerText = e.message; }
                });
                document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); currentUser = null; userSubscription = null; setPage('home'); });
                const contactForm = document.getElementById('contactForm');
                if(contactForm) contactForm.onsubmit = async (e) => { e.preventDefault(); const name = document.getElementById('contactName').value, email = document.getElementById('contactEmailInput').value, msg = document.getElementById('contactMessage').value; if(!name||!email||!msg) return; try { await addDoc(collection(db,"contactMessages"),{name,email,message:msg,timestamp:new Date().toISOString()}); document.getElementById('contactFormMsg').innerText = "✅ Sent!"; contactForm.reset(); setTimeout(()=>document.getElementById('contactFormMsg').innerText="",3000); } catch(e){ alert("Error"); } };
                if (currentPage === 'home') setTimeout(() => initMainCarousel(), 100);
                // Material page login
                document.getElementById('matLoginBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('matEmail').value, pwd = document.getElementById('matPassword').value;
                    try { await signInWithEmailAndPassword(auth, email, pwd); await loadUserSubscription(); renderCurrentView(); } catch(e){ document.getElementById('matMsg').innerText = e.message; }
                });
                document.getElementById('matRegisterBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('matEmail').value, pwd = document.getElementById('matPassword').value;
                    try { await createUserWithEmailAndPassword(auth, email, pwd); await loadUserSubscription(); renderCurrentView(); } catch(e){ document.getElementById('matMsg').innerText = e.message; }
                });
            } else {
                if (mainCarouselInterval) clearInterval(mainCarouselInterval);
                root.innerHTML = renderAdminView();
                if (adminAuthorized) { setTimeout(()=>loadAdminDashboardLogic(),50); document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.reload(); }); document.getElementById('viewMainSiteBtn')?.addEventListener('click', () => { const mainUrl = new URL(window.location.href); mainUrl.searchParams.delete('admin'); window.open(mainUrl.toString(), '_blank'); }); }
                else { attachAdminAuthEvents(); }
            }
        }
        function attachAdminAuthEvents() {
            document.getElementById('adminLoginBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value;
                try { const cred = await signInWithEmailAndPassword(auth, email, pwd); if(await checkAdminAuthorization(cred.user)) { adminAuthorized=true; renderCurrentView(); } else document.getElementById('adminAuthMsg').innerText="Not admin."; } 
                catch(e){ document.getElementById('adminAuthMsg').innerText=e.message; }
            });
            document.getElementById('adminRegisterBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value;
                if(!email||!pwd) return;
                try { const userCred = await createUserWithEmailAndPassword(auth, email, pwd); const adminDocRef = doc(db,"admin","adminData"); const snap = await getDoc(adminDocRef); if(!snap.exists()) { await setDoc(adminDocRef, { adminUid: userCred.user.uid }); adminAuthorized=true; renderCurrentView(); } else alert("Admin already exists."); } 
                catch(e){ alert(e.message); }
            });
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) await loadUserSubscription();
            else userSubscription = null;
            if (currentMode !== 'admin') renderCurrentView();
        });

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMode = urlParams.get('admin') === 'true' ? 'admin' : 'user';
            await initRealtimeSync();
            if (currentMode === 'admin') {
                onAuthStateChanged(auth, async (user) => { if (user) adminAuthorized = await checkAdminAuthorization(user); else adminAuthorized = false; renderCurrentView(); });
            } else {
                currentPage = getPageFromHash();
                renderCurrentView();
            }
            setTimeout(() => { const ld = document.getElementById('loadingScreen'); if(ld) { ld.classList.add('fade-out'); setTimeout(()=>{if(ld&&ld.parentNode) ld.style.display='none';},800); } }, 3000);
        }
        init();
    </script>
</body>
</html>
