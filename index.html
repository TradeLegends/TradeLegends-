<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TradeLegends | Crypto Education Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html5-sortable@0.11.0/dist/html5-sortable.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s ease, color 0.2s ease; margin: 0; overflow-x: hidden; }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/S7cgyHJ2/fcd9ca6e-d05e-497c-90a6-c833528f92d4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            backdrop-filter: brightness(0.7) blur(2px);
        }
        .loading-screen::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 31, 0.65); z-index: 1; }
        .loading-content { position: relative; z-index: 2; text-align: center; animation: pulseGlow 1.5s infinite ease-in-out; }
        .loading-logo { width: 180px; height: auto; border-radius: 32px; box-shadow: 0 0 30px rgba(247, 147, 26, 0.4); animation: floatLogo 2s infinite alternate; }
        .loading-text { margin-top: 24px; font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #f7931a, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
        .loading-dots span { display: inline-block; animation: dotBlink 1.4s infinite; font-size: 2rem; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulseGlow { 0% { transform: scale(0.98); opacity: 0.8; } 100% { transform: scale(1.02); opacity: 1; } }
        @keyframes floatLogo { 0% { transform: translateY(0px); } 100% { transform: translateY(-12px); } }
        @keyframes dotBlink { 0%, 20% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .loading-screen.fade-out { opacity: 0; visibility: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.15); }
        .package-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .package-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.3); }
        .btn-glow { transition: all 0.2s; }
        .btn-glow:hover { filter: brightness(1.05); box-shadow: 0 0 12px currentColor; }
        .hero-gradient { background: radial-gradient(circle at 10% 30%, rgba(0,255,255,0.08) 0%, rgba(0,0,0,0) 60%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #f0b90b; border-radius: 10px; }
        .page-transition { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lang-btn { transition: all 0.2s; cursor: pointer; }
        .lang-btn.active { font-weight: bold; text-decoration: underline; }
        .carousel-container { position: relative; overflow: hidden; border-radius: 1.5rem; box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5); }
        .carousel-slides { display: flex; transition: transform 0.5s ease-in-out; }
        .carousel-slide { flex: 0 0 100%; }
        .carousel-slide a { display: block; cursor: pointer; }
        .carousel-slide img { width: 100%; height: 400px; object-fit: cover; transition: transform 0.2s; }
        .carousel-slide img:hover { transform: scale(1.02); }
        .carousel-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; }
        .carousel-dot.active { background: white; transform: scale(1.2); }
        @media (max-width: 768px) { .carousel-slide img { height: 250px; } }
        .disclaimer-card { background: rgba(0,0,0,0.6); border-left: 4px solid #f7931a; font-size: 0.8rem; }
        .image-editor-item { transition: all 0.2s; cursor: grab; background: rgba(0,0,0,0.3); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .image-editor-item:active { cursor: grabbing; }
        .image-preview-container { position: relative; display: inline-block; }
        .zoom-controls { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); border-radius: 20px; padding: 4px 8px; display: flex; gap: 8px; z-index: 10; }
        .zoom-controls button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 50%; transition: all 0.2s; }
        .zoom-controls button:hover { background: rgba(255,255,255,0.2); }
        .preview-img { transition: transform 0.2s ease; transform-origin: center center; width: 120px; height: 80px; object-fit: cover; border-radius: 0.5rem; }
        .sortable-handle { cursor: grab; padding: 8px; font-size: 20px; }
        .sortable-handle:active { cursor: grabbing; }
        .section-card-image { width: 100%; max-height: 200px; object-fit: cover; border-radius: 1rem; margin-bottom: 1rem; }

        /* DROPDOWN MENU STYLES */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(10, 10, 31, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.5rem 0;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            z-index: 100;
        }
        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-menu a {
            display: block;
            padding: 0.5rem 1rem;
            color: #f0f0f0;
            text-decoration: none;
            transition: background 0.2s;
        }
        .dropdown-menu a:hover {
            background: rgba(255,255,255,0.1);
        }
        .dropdown-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (max-width: 768px) {
            .dropdown-menu {
                position: fixed;
                top: 70px;
                left: 1rem;
                right: 1rem;
                width: auto;
            }
        }
    </style>
</head>
<body class="text-gray-200">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="https://i.ibb.co/Rp4NpbPL/Edit-the-existing-lo3.jpg" alt="TradeLegends Logo" class="loading-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4664/4664838.png'">
            <div class="loading-text mt-4">TradeLegends</div>
            <div class="loading-dots mt-2"><span>.</span><span>.</span><span>.</span></div>
            <p class="text-gray-200 text-sm mt-4 font-medium">Loading premium content...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxtXsrp9kk0nHfuw53CQ-KUqVYukyRZqM",
            authDomain: "tradelegends-ee76e.firebaseapp.com",
            projectId: "tradelegends-ee76e",
            storageBucket: "tradelegends-ee76e.firebasestorage.app",
            messagingSenderId: "70719513507",
            appId: "1:70719513507:web:f9e6edb7cbedfe0a2c7016"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentMode = 'user';
        let adminAuthorized = false;
        let settingsUnsubscribe = null;
        let packagesUnsubscribe = null;
        let announcementsUnsubscribe = null;
        let currentLanguage = 'el';
        let currentUser = null;
        let userSubscription = null;
        
        const translations = {
            el: { home: "Αρχική", education: "Εκπαίδευση", mentor: "Mentor", community: "Κοινότητα", pricing: "Τιμολόγηση", adminPortal: "Admin Portal", explorePackages: "Εξερεύνηση Πακέτων", latestNews: "Τελευταία Νέα & Ανακοινώσεις", selectPackage: "Επιλέξτε Πακέτο", oneTime: "εφάπαξ", loading: "Φόρτωση...", noAnnouncements: "Νέες ανακοινώσεις σύντομα...", disclaimer: "⚠️ Σημαντική Αποποίηση Ευθύνης", login: "Σύνδεση", register: "Εγγραφή", logout: "Αποσύνδεση", myMaterial: "Το Υλικό μου", pendingApproval: "Η αίτησή σας εκκρεμεί" },
            en: { home: "Home", education: "Education", mentor: "Mentor", community: "Community", pricing: "Pricing", adminPortal: "Admin Portal", explorePackages: "Explore Packages", latestNews: "Latest News & Announcements", selectPackage: "Select Package", oneTime: "one-time", loading: "Loading...", noAnnouncements: "New announcements soon...", disclaimer: "⚠️ Risk Disclaimer", login: "Login", register: "Register", logout: "Logout", myMaterial: "My Material", pendingApproval: "Your request is pending" }
        };
        function t(key) { return translations[currentLanguage][key] || key; }

        let siteSettings = {
            primaryColor: '#f7931a',
            backgroundColor: '#0a0a1f',
            textColor: '#f0f0f0',
            logoUrl: 'https://cdn-icons-png.flaticon.com/512/4664/4664838.png',
            footerText: '© 2025 TradeLegends — Empowering Financial Freedom',
            heroTitle: 'Master Crypto & Financial Markets',
            heroSubtitle: 'Learn to trade like a legend with expert-led courses and real market insights.',
            heroImageUrl: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?q=80&w=2070&auto=format',
            splashImageUrl: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=1600&h=900&fit=crop',
            homeContent: 'Καλώς ήρθατε στο TradeLegends! Ανακαλύψτε τον κόσμο των κρύπτο και των χρηματοοικονομικών αγορών με κορυφαίους mentors και μία ενεργή κοινότητα.',
            homeImages: '[{"image":"https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800","link":""}]',
            educationContent: 'Ανακαλύψτε τα βασικά και προχωρημένα θέματα των κρύπτο και των χρηματοοικονομικών αγορών. Μαθήματα βίντεο, διαδραστικά quizzes και πραγματικές μελέτες περίπτωσης από ειδικούς.',
            educationImages: '[{"image":"https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800","link":""}]',
            mentorContent: 'Η ομάδα μας αποτελείται από επαγγελματίες traders με χρόνια εμπειρίας. Προσωπική καθοδήγηση, live sessions και στρατηγικές που αποδίδουν.',
            mentorImages: '[{"image":"https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=800","link":""}]',
            communityContent: 'Γίνετε μέλος σε μια αποκλειστική κοινότητα φιλόδοξων επενδυτών. Ανταλλάξτε ιδέες, συμμετέχετε σε webinars και λαμβάνετε καθημερινή υποστήριξη.',
            communityImages: '[{"image":"https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=800","link":""}]',
            pricingContent: 'Επιλέξτε το πρόγραμμα που ταιριάζει στους στόχους σας. Όλα τα πακέτα περιλαμβάνουν пожизненную πρόσβαση και υποστήριξη.',
            pricingImages: '[{"image":"https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800","link":""}]',
            heroTitle_en: 'Master Crypto & Financial Markets',
            heroSubtitle_en: 'Learn to trade like a legend with expert-led courses and real market insights.',
            homeContent_en: 'Welcome to TradeLegends! Discover the world of crypto and financial markets with top mentors and an active community.',
            educationContent_en: 'Discover basic and advanced topics of crypto and financial markets. Video lessons, interactive quizzes, and real case studies by experts.',
            mentorContent_en: 'Our team consists of professional traders with years of experience. Personal guidance, live sessions, and proven strategies.',
            communityContent_en: 'Join an exclusive community of ambitious investors. Exchange ideas, participate in webinars, and receive daily support.',
            pricingContent_en: 'Choose the program that fits your goals. All packages include lifetime access and support.',
            mainCarousel: '[{"image":"https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200","link":"https://www.binance.com"},{"image":"https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=1200","link":"https://www.coinbase.com"},{"image":"https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=1200","link":"https://www.tradingview.com"},{"image":"https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=1200","link":"https://www.coingecko.com"}]',
            disclaimerText: '⚠️ ΠΡΟΣΟΧΗ: Οι επενδύσεις σε κρύπτο και χρηματοοικονομικά προϊόντα ενέχουν υψηλό κίνδυνο. Οι προηγούμενες αποδόσεις δεν εγγυώνται μελλοντικά αποτελέσματα. Το TradeLegends παρέχει αποκλειστικά εκπαιδευτικό περιεχόμενο και όχι επενδυτικές συμβουλές. Συμβουλευτείτε πάντα έναν εξειδικευμένο σύμβουλο πριν προβείτε σε επένδυση.',
            disclaimerText_en: '⚠️ WARNING: Crypto and financial investments involve high risk. Past performance does not guarantee future results. TradeLegends provides educational content only, not investment advice. Always consult a qualified advisor before investing.'
        };
        let packagesList = [];
        let announcementsList = [];
        let mainCarouselList = [];
        let homeGallery = [], educationGallery = [], mentorGallery = [], communityGallery = [], pricingGallery = [];

        function parseGallery(jsonStr, defaultArr) {
            try { let arr = JSON.parse(jsonStr); if (Array.isArray(arr)) return arr; return defaultArr; } catch(e) { return defaultArr; }
        }
        function parseMainCarousel() {
            try { mainCarouselList = JSON.parse(siteSettings.mainCarousel); } catch(e) { mainCarouselList = []; }
            if (!mainCarouselList.length) mainCarouselList = [{image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=1200', link: ''}];
        }
        function parseAllGalleries() {
            homeGallery = parseGallery(siteSettings.homeImages, [{image: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', link: ''}]);
            educationGallery = parseGallery(siteSettings.educationImages, [{image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800', link: ''}]);
            mentorGallery = parseGallery(siteSettings.mentorImages, [{image: 'https://images.unsplash.com/photo-1621504450181-5d356f61d307?w=800', link: ''}]);
            communityGallery = parseGallery(siteSettings.communityImages, [{image: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=800', link: ''}]);
            pricingGallery = parseGallery(siteSettings.pricingImages, [{image: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=800', link: ''}]);
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function applyTheme(s) { document.body.style.backgroundColor = s.backgroundColor; document.body.style.color = s.textColor; }
        function getLocalizedField(field) { let val = siteSettings[field]; if (currentLanguage === 'en' && siteSettings[field + '_en']) val = siteSettings[field + '_en']; return escapeHtml(val); }
        function getDisclaimerText() { return currentLanguage === 'en' ? escapeHtml(siteSettings.disclaimerText_en) : escapeHtml(siteSettings.disclaimerText); }

        function initRealtimeSync() {
            if (settingsUnsubscribe) settingsUnsubscribe();
            const settingsRef = doc(db, "settings", "siteConfig");
            settingsUnsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) siteSettings = { ...siteSettings, ...docSnap.data() };
                else setDoc(settingsRef, siteSettings).catch(console.error);
                parseMainCarousel();
                parseAllGalleries();
                applyTheme(siteSettings);
                renderCurrentView();
            });
            if (packagesUnsubscribe) packagesUnsubscribe();
            packagesUnsubscribe = onSnapshot(query(collection(db, "packages"), orderBy("order", "asc")), (snapshot) => {
                packagesList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
            if (announcementsUnsubscribe) announcementsUnsubscribe();
            announcementsUnsubscribe = onSnapshot(query(collection(db, "announcements"), orderBy("createdAt", "desc")), (snapshot) => {
                announcementsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCurrentView();
            });
        }

        let currentPage = 'home';
        let mainCarouselInterval = null;
        let currentMainSlide = 0;

        function setPage(page) { currentPage = page; window.location.hash = page; renderCurrentView(); }
        function getPageFromHash() { let hash = window.location.hash.substring(1); return ['home','education','mentor','community','pricing','material'].includes(hash) ? hash : 'home'; }
        window.addEventListener('hashchange', () => { if (currentMode === 'user') { currentPage = getPageFromHash(); renderCurrentView(); } });

        function initMainCarousel() {
            if (mainCarouselInterval) clearInterval(mainCarouselInterval);
            const slides = document.getElementById('mainCarouselSlides');
            const dots = document.getElementById('mainCarouselDots');
            if (!slides || !dots || !mainCarouselList.length) return;
            slides.innerHTML = '';
            mainCarouselList.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'carousel-slide';
                const img = `<img src="${escapeHtml(item.image)}" onerror="this.src='https://via.placeholder.com/1200x400'">`;
                div.innerHTML = item.link ? `<a href="${escapeHtml(item.link)}" target="_blank">${img}</a>` : img;
                slides.appendChild(div);
            });
            dots.innerHTML = '';
            mainCarouselList.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${idx === 0 ? 'active' : ''}`;
                dot.onclick = () => goToSlide(idx);
                dots.appendChild(dot);
            });
            function goToSlide(idx) {
                currentMainSlide = idx;
                slides.style.transform = `translateX(-${idx * 100}%)`;
                document.querySelectorAll('#mainCarouselDots .carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            }
            mainCarouselInterval = setInterval(() => { if (mainCarouselList.length) goToSlide((currentMainSlide + 1) % mainCarouselList.length); }, 5000);
            goToSlide(0);
        }

        function renderSectionWithGallery(content, gallery, sectionId) {
            const galleryId = `gallery_${sectionId}_${Date.now()}`;
            const dotsId = `dots_${sectionId}_${Date.now()}`;
            const galleryHtml = gallery.length ? `
                <div class="carousel-container mb-6">
                    <div id="${galleryId}" class="carousel-slides"></div>
                    <div id="${dotsId}" class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-10"></div>
                </div>
                <script>
                    setTimeout(() => {
                        const slides = document.getElementById('${galleryId}');
                        const dots = document.getElementById('${dotsId}');
                        if(slides && dots && ${JSON.stringify(gallery)}.length) {
                            const g = ${JSON.stringify(gallery)};
                            slides.innerHTML = '';
                            g.forEach((item, idx) => {
                                const div = document.createElement('div');
                                div.className = 'carousel-slide';
                                const img = '<img src="'+escapeHtml(item.image)+'" onerror="this.src='https://via.placeholder.com/1200x400'">';
                                div.innerHTML = item.link ? '<a href="'+escapeHtml(item.link)+'" target="_blank">'+img+'</a>' : img;
                                slides.appendChild(div);
                            });
                            dots.innerHTML = '';
                            g.forEach((_, idx) => {
                                const dot = document.createElement('div');
                                dot.className = 'carousel-dot ' + (idx === 0 ? 'active' : '');
                                dot.onclick = () => {
                                    slides.style.transform = 'translateX(-' + (idx * 100) + '%)';
                                    dots.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
                                };
                                dots.appendChild(dot);
                            });
                            let interval = setInterval(() => {
                                let current = 0;
                                for(let i=0;i<slides.children.length;i++) {
                                    if(slides.children[i].getBoundingClientRect().left >= -10 && slides.children[i].getBoundingClientRect().left < window.innerWidth) {
                                        current = i; break;
                                    }
                                }
                                let next = (current + 1) % g.length;
                                slides.style.transform = 'translateX(-' + (next * 100) + '%)';
                                dots.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === next));
                            }, 5000);
                            slides.parentElement._interval = interval;
                        }
                    }, 100);
                <\/script>
            ` : '';
            return `<div class="glass-card p-8 rounded-2xl" style="background: rgba(0,0,0,0.3);">${galleryHtml}<p class="text-lg leading-relaxed">${content}</p></div>`;
        }

        function renderHomePage(primary) {
            const announcementsHtml = announcementsList.filter(a => a.active !== false).length ?
                `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${announcementsList.filter(a => a.active !== false).map(ann => {
                    let title = ann.title, content = ann.content;
                    if (currentLanguage === 'en' && ann.title_en) title = ann.title_en;
                    if (currentLanguage === 'en' && ann.content_en) content = ann.content_en;
                    return `<div class="glass-card p-5 rounded-xl" style="border-left: 3px solid ${primary};"><h3 class="text-xl font-bold mb-2" style="color:${primary}">${escapeHtml(title)}</h3><p class="text-gray-200 text-sm">${escapeHtml(content)}</p>${ann.link ? `<a href="${escapeHtml(ann.link)}" target="_blank" class="inline-block mt-3 text-xs" style="color:${primary}">Learn more →</a>` : ''}</div>`;
                }).join('')}</div>` : `<div class="text-center text-gray-400 py-8">${t('noAnnouncements')}</div>`;
            const homeSection = renderSectionWithGallery(getLocalizedField('homeContent'), homeGallery, 'home');
            return `
                <div class="relative overflow-hidden pt-8 pb-8">
                    <div class="absolute inset-0 hero-gradient opacity-40"></div>
                    <div class="container mx-auto px-6 relative z-10">
                        <div class="flex flex-col lg:flex-row items-center gap-12">
                            <div class="flex-1 text-center lg:text-left">
                                <h1 class="text-5xl md:text-6xl font-extrabold mb-4">${getLocalizedField('heroTitle')}</h1>

        function createGalleryEditor(gallery, galleryName, saveField) {
            const container = document.createElement('div');
            container.className = 'space-y-3 mb-8';
            function refresh() {
                container.innerHTML = `<h3 class="font-bold text-lg mb-3">🖼️ ${galleryName} Gallery (drag to reorder, zoom, add links)</h3>`;
                gallery.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-editor-item flex flex-col md:flex-row items-center gap-4';
                    div.innerHTML = `
                        <div class="sortable-handle"><i class="fas fa-grip-vertical text-gray-400 text-2xl"></i></div>
                        <div class="image-preview-container relative"><img src="${escapeHtml(item.image)}" class="preview-img" onerror="this.src='https://via.placeholder.com/120x80?text=Error'"><div class="zoom-controls"><button class="zoom-in"><i class="fas fa-search-plus"></i></button><button class="zoom-out"><i class="fas fa-search-minus"></i></button></div></div>
                        <div class="flex-1 w-full space-y-2"><input type="text" class="image-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.image)}" placeholder="Image URL (1920x1080)"><input type="text" class="link-url w-full p-2 rounded bg-gray-700 text-sm" value="${escapeHtml(item.link || '')}" placeholder="Link URL (optional)"><button class="delete-item bg-red-600 text-xs px-3 py-1 rounded"><i class="fas fa-trash"></i> Delete</button></div>
                    `;
                    container.appendChild(div);
                });
                const addBtn = document.createElement('button');
                addBtn.className = 'mt-3 bg-emerald-600 text-sm px-4 py-2 rounded-lg w-full md:w-auto';
                addBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Image';
                addBtn.onclick = () => { gallery.push({ image: 'https://via.placeholder.com/1920x1080?text=New+Image', link: '' }); refresh(); save(); };
                container.appendChild(addBtn);
                container.querySelectorAll('.zoom-in').forEach(btn => btn.onclick = () => { const img = btn.closest('.image-preview-container').querySelector('.preview-img'); let s = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1; s = Math.min(s + 0.2, 3); img.style.transform = `scale(${s})`; });
                container.querySelectorAll('.zoom-out').forEach(btn => btn.onclick = () => { const img = btn.closest('.image-preview-container').querySelector('.preview-img'); let s = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1; s = Math.max(s - 0.2, 0.5); img.style.transform = `scale(${s})`; });
                container.querySelectorAll('.image-url').forEach((input, i) => input.onchange = () => { gallery[i].image = input.value; save(); });
                container.querySelectorAll('.link-url').forEach((input, i) => input.onchange = () => { gallery[i].link = input.value; save(); });
                container.querySelectorAll('.delete-item').forEach((btn, i) => btn.onclick = () => { gallery.splice(i,1); refresh(); save(); });
            }
            async function save() { await updateDoc(doc(db, "settings", "siteConfig"), { [saveField]: JSON.stringify(gallery) }); document.getElementById('galleryMsg').innerText = `✅ ${galleryName} saved!`; setTimeout(()=>document.getElementById('galleryMsg').innerText="",2000); }
            refresh();
            if (window.sortable) window.sortable(container, { items: '.image-editor-item', handle: '.sortable-handle', onDrop: () => { const newItems = []; container.querySelectorAll('.image-editor-item').forEach(el => { newItems.push({ image: el.querySelector('.image-url').value, link: el.querySelector('.link-url').value }); }); gallery.length = 0; newItems.forEach(i => gallery.push(i)); save(); } });
            return container;
        }

                <div><label>Background Color</label><input type="color" id="backgroundColor" value="${siteSettings.backgroundColor}" class="w-full p-1 rounded"></div>
                <div><label>Logo URL</label><input id="logoUrl" value="${escapeHtml(siteSettings.logoUrl)}" class="w-full p-2 rounded bg-gray-800"></div>
                <div><label>Footer Text</label><input id="footerText" value="${escapeHtml(siteSettings.footerText)}" class="w-full p-2 rounded bg-gray-800"></div>
                <div><label>Splash Image URL</label><input id="splashImageUrl" value="${escapeHtml(siteSettings.splashImageUrl)}" class="w-full p-2 rounded bg-gray-800"></div>
                <div class="col-span-2"><hr class="border-gray-600 my-2"><h3 class="font-bold">Page Text Content</h3></div>
                <div class="col-span-2"><label>Home Content (el)</label><textarea id="homeContent" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.homeContent)}</textarea></div>
                <div class="col-span-2"><label>Home Content (en)</label><textarea id="homeContent_en" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.homeContent_en||'')}</textarea></div>

                <div class="col-span-2"><label>Education Content (en)</label><textarea id="educationContent_en" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.educationContent_en||'')}</textarea></div>
                <div class="col-span-2"><label>Mentor Content (el)</label><textarea id="mentorContent" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.mentorContent)}</textarea></div>
                <div class="col-span-2"><label>Mentor Content (en)</label><textarea id="mentorContent_en" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.mentorContent_en||'')}</textarea></div>
                <div class="col-span-2"><label>Community Content (el)</label><textarea id="communityContent" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.communityContent)}</textarea></div>
                <div class="col-span-2"><label>Community Content (en)</label><textarea id="communityContent_en" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.communityContent_en||'')}</textarea></div>
                <div class="col-span-2"><label>Pricing Content (el)</label><textarea id="pricingContent" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.pricingContent)}</textarea></div>
                <div class="col-span-2"><label>Pricing Content (en)</label><textarea id="pricingContent_en" rows="3" class="w-full p-2 rounded bg-gray-800">${escapeHtml(siteSettings.pricingContent_en||'')}</textarea></div>

        async function renderPackagesTab() { const container = document.getElementById('adminTabContent'); const pkgHtml = packagesList.map(p => `<div class="border-b py-2"><div class="flex justify-between"><div><strong>${escapeHtml(p.name)}</strong> / ${escapeHtml(p.name_en||'')}<br><span class="text-xs">${escapeHtml(p.price)}</span></div><div><button onclick="window.editPackage('${p.id}')" class="bg-blue-600 px-2 py-1 rounded text-sm">Edit</button> <button onclick="window.deletePackageItem('${p.id}')" class="bg-red-600 px-2 py-1 rounded text-sm">Del</button></div></div></div>`).join(''); container.innerHTML = `<h3 class="text-xl font-bold">Packages</h3><button id="newPackageBtn" class="mb-3 bg-emerald-600 px-3 py-1 rounded">+ New</button><div>${pkgHtml||'None'}</div>`; document.getElementById('newPackageBtn').onclick = () => showPackageForm(); window.editPackage = (id) => showPackageForm(packagesList.find(p=>p.id===id)); window.deletePackageItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db,"packages",id)); }; }
        async function showPackageForm(existing=null) { const material = existing?.material || { content: '', links: [], videos: [] }; const modalDiv = document.createElement('div'); modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4 overflow-auto"; modalDiv.innerHTML = `<div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-auto"><h3 class="text-xl font-bold">${existing?'Edit':'New'} Package</h3><div class="grid grid-cols-2 gap-3"><div><label>Name (el)</label><input id="pkgName" value="${existing?escapeHtml(existing.name):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Name (en)</label><input id="pkgName_en" value="${existing?escapeHtml(existing.name_en||''):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Price</label><input id="pkgPrice" value="${existing?escapeHtml(existing.price):''}" class="w-full p-2 rounded bg-gray-800"></div><div><label>Image URL</label><input id="pkgImage" value="${existing?escapeHtml(existing.imageUrl||''):''}" class="w-full p-2 rounded bg-gray-800"></div><div class="col-span-2"><label>Description (el)</label><textarea id="pkgDesc" rows="2" class="w-full p-2 rounded bg-gray-800">${existing?escapeHtml(existing.description||''):''}</textarea></div><div class="col-span-2"><label>Description (en)</label><textarea id="pkgDesc_en" rows="2" class="w-full p-2 rounded bg-gray-800">${existing?escapeHtml(existing.description_en||''):''}</textarea></div><div class="col-span-2"><label>Features (el) - comma</label><input id="pkgFeatures" value="${existing&&existing.features?existing.features.join(','):''}" class="w-full p-2 rounded bg-gray-800"></div><div class="col-span-2"><label>Features (en) - comma</label><input id="pkgFeatures_en" value="${existing&&existing.features_en?existing.features_en.join(','):''}" class="w-full p-2 rounded bg-gray-800"></div><div class="col-span-2"><hr><h4 class="font-bold">Exclusive Material</h4></div><div class="col-span-2"><label>Material Content (HTML)</label><textarea id="materialContent" rows="4" class="w-full p-2 rounded bg-gray-800">${escapeHtml(material.content||'')}</textarea></div><div class="col-span-2"><label>Material Links (JSON)</label><textarea id="materialLinks" rows="3" class="w-full p-2 rounded bg-gray-800">${JSON.stringify(material.links||[])}</textarea></div><div class="col-span-2"><label>Material Videos (JSON)</label><textarea id="materialVideos" rows="3" class="w-full p-2 rounded bg-gray-800">${JSON.stringify(material.videos||[])}</textarea></div></div><div class="flex gap-3 mt-4"><button id="savePkgBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelPkgBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`; document.body.appendChild(modalDiv); modalDiv.querySelector('#savePkgBtn').onclick = async () => { const name = document.getElementById('pkgName').value.trim(); if(!name) return; let links, videos; try { links = JSON.parse(document.getElementById('materialLinks').value); } catch(e){ links = []; } try { videos = JSON.parse(document.getElementById('materialVideos').value); } catch(e){ videos = []; } const data = { name, name_en: document.getElementById('pkgName_en').value.trim(), price: document.getElementById('pkgPrice').value, description: document.getElementById('pkgDesc').value, description_en: document.getElementById('pkgDesc_en').value, imageUrl: document.getElementById('pkgImage').value, features: document.getElementById('pkgFeatures').value.split(',').map(f=>f.trim()), features_en: document.getElementById('pkgFeatures_en').value.split(',').map(f=>f.trim()), material: { content: document.getElementById('materialContent').value, links, videos }, order: existing?existing.order:Date.now() }; if(existing) await updateDoc(doc(db,"packages",existing.id), data); else await addDoc(collection(db,"packages"), data); modalDiv.remove(); renderPackagesTab(); }; modalDiv.querySelector('#cancelPkgBtn').onclick = () => modalDiv.remove(); }
        async function renderAdminSubscriptionsTab() { const subsSnap = await getDocs(query(collection(db,"subscriptions"), orderBy("requestedAt","desc"))); let html = `<h3 class="text-xl font-bold mb-4">Subscriptions</h3><table class="w-full text-sm"><thead><tr><th>Email</th><th>Package</th><th>Status</th><th>Requested</th><th>Actions</th></tr></thead><tbody>`; subsSnap.forEach(d => { const s = d.data(); html += `<tr><td class="py-1">${escapeHtml(s.userEmail)}</td><td>${escapeHtml(s.packageName)}</td><td><span class="px-2 py-0.5 rounded-full text-xs ${s.status==='approved'?'bg-green-600':'bg-yellow-600'}">${s.status}</span></td><td class="text-xs">${new Date(s.requestedAt).toLocaleDateString()}</td><td>${s.status!=='approved'?`<button class="approve-sub bg-green-600 px-2 py-1 rounded text-xs" data-id="${d.id}">Approve</button>`:''} <button class="delete-sub bg-red-600 px-2 py-1 rounded text-xs" data-id="${d.id}">Delete</button></td></tr>`; }); html+=`</tbody></table>`; document.getElementById('adminTabContent').innerHTML=html; document.querySelectorAll('.approve-sub').forEach(btn => btn.onclick = async () => { await updateDoc(doc(db,"subscriptions",btn.dataset.id),{status:"approved",approvedAt:new Date().toISOString()}); renderAdminSubscriptionsTab(); }); document.querySelectorAll('.delete-sub').forEach(btn => btn.onclick = async () => { if(confirm("Delete?")) await deleteDoc(doc(db,"subscriptions",btn.dataset.id)); renderAdminSubscriptionsTab(); }); }
        async function renderLeadsTab() { const leads = await getDocs(query(collection(db,"leads"), orderBy("timestamp","desc"))); let html = `<h3 class="text-xl font-bold">Leads</h3><table class="w-full text-sm"><thead><tr><th>Name</th><th>Email</th><th>Package</th><th>Date</th></tr></thead><tbody>`; leads.forEach(d => { const data=d.data(); html+=`<tr><td class="py-1">${escapeHtml(data.name)}</td><td>${escapeHtml(data.email)}</td><td>${escapeHtml(data.packageName)}</td><td class="text-xs">${new Date(data.timestamp).toLocaleString()}</td></tr>`; }); html+=`</tbody></table><button id="clearLeadsBtn" class="mt-4 bg-red-600 px-3 py-1 rounded text-sm">Clear All</button>`; document.getElementById('adminTabContent').innerHTML=html; document.getElementById('clearLeadsBtn')?.onclick = async () => { if(confirm("Delete ALL leads?")) { const all = await getDocs(collection(db,"leads")); all.forEach(d => deleteDoc(doc(db,"leads",d.id))); renderLeadsTab(); } }; }
        async function renderAnnouncementsTab() { const annHtml = announcementsList.map(a => `<div class="border-b py-2"><strong>${escapeHtml(a.title)}</strong> / ${escapeHtml(a.title_en||'')} - ${a.active!==false?'Active':'Inactive'} <button onclick="window.editAnnouncement('${a.id}')" class="bg-blue-600 px-2 rounded text-sm">Edit</button> <button onclick="window.deleteAnnouncementItem('${a.id}')" class="bg-red-600 px-2 rounded text-sm">Del</button></div>`).join(''); document.getElementById('adminTabContent').innerHTML = `<h3 class="text-xl font-bold">Announcements</h3><button id="newAnnBtn" class="mb-3 bg-emerald-600 px-3 py-1 rounded">+ New</button><div>${annHtml||'None'}</div>`; document.getElementById('newAnnBtn').onclick = () => showAnnouncementForm(); window.editAnnouncement = (id) => showAnnouncementForm(announcementsList.find(a=>a.id===id)); window.deleteAnnouncementItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db,"announcements",id)); renderAnnouncementsTab(); }; }
        async function showAnnouncementForm(existing=null) { const modalDiv = document.createElement('div'); modalDiv.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[1000] p-4"; modalDiv.innerHTML = `<div class="glass-card bg-gray-900 p-6 rounded-2xl w-full max-w-lg"><h3>${existing?'Edit':'New'} Announcement</h3><div><label>Title (el)</label><input id="annTitle" value="${existing?escapeHtml(existing.title):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label>Title (en)</label><input id="annTitle_en" value="${existing?escapeHtml(existing.title_en||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label>Content (el)</label><textarea id="annContent" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content):''}</textarea></div><div><label>Content (en)</label><textarea id="annContent_en" rows="3" class="w-full p-2 mb-2 rounded bg-gray-800">${existing?escapeHtml(existing.content_en||''):''}</textarea></div><div><label>Link</label><input id="annLink" value="${existing?escapeHtml(existing.link||''):''}" class="w-full p-2 mb-2 rounded bg-gray-800"></div><div><label><input type="checkbox" id="annActive" ${existing&&existing.active===false?'':'checked'}> Active</label></div><div class="flex gap-3 mt-4"><button id="saveAnnBtn" class="bg-amber-500 py-2 px-4 rounded">Save</button><button id="cancelAnnBtn" class="bg-gray-600 py-2 px-4 rounded">Cancel</button></div></div>`; document.body.appendChild(modalDiv); modalDiv.querySelector('#saveAnnBtn').onclick = async () => { const data = { title: document.getElementById('annTitle').value, title_en: document.getElementById('annTitle_en').value, content: document.getElementById('annContent').value, content_en: document.getElementById('annContent_en').value, link: document.getElementById('annLink').value, active: document.getElementById('annActive').checked, updatedAt: new Date().toISOString(), createdAt: existing?existing.createdAt:new Date().toISOString() }; if(existing) await updateDoc(doc(db,"announcements",existing.id), data); else await addDoc(collection(db,"announcements"), data); modalDiv.remove(); renderAnnouncementsTab(); }; modalDiv.querySelector('#cancelAnnBtn').onclick = () => modalDiv.remove(); }

        function renderCurrentView() {
            const root = document.getElementById('root');
            if (currentMode === 'user') {
                root.innerHTML = renderUserView();
                const trigger = document.querySelector('.dropdown-trigger');
                const dropdown = document.querySelector('.dropdown-menu');
                if (trigger && dropdown) {
                    trigger.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); });
                    document.addEventListener('click', (e) => { if (!trigger.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show'); });
                    dropdown.querySelectorAll('a').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); setPage(link.getAttribute('data-page')); dropdown.classList.remove('show'); }));
                }
                document.getElementById('openAdminWindowBtn')?.addEventListener('click', () => { const url = new URL(window.location.href); url.searchParams.set('admin','true'); window.open(url.toString(), '_blank', 'width=1300,height=900'); });
                document.getElementById('langEl')?.addEventListener('click', () => { currentLanguage = 'el'; renderCurrentView(); });
                document.getElementById('langEn')?.addEventListener('click', () => { currentLanguage = 'en'; renderCurrentView(); });
                document.getElementById('showAuthModalBtn')?.addEventListener('click', () => document.getElementById('authModal').classList.remove('hidden'));
                document.getElementById('authLoginBtn')?.addEventListener('click', async () => { const email = document.getElementById('authEmail').value, pwd = document.getElementById('authPassword').value; try { await signInWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').classList.add('hidden'); await loadUserSubscription(); if(currentPage === 'material') renderCurrentView(); } catch(e){ document.getElementById('authMsg').innerText = e.message; } });
                document.getElementById('authRegisterBtn')?.addEventListener('click', async () => { const email = document.getElementById('authEmail').value, pwd = document.getElementById('authPassword').value; try { await createUserWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').classList.add('hidden'); await loadUserSubscription(); if(currentPage === 'material') renderCurrentView(); } catch(e){ document.getElementById('authMsg').innerText = e.message; } });
                document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); currentUser = null; userSubscription = null; setPage('home'); });
                if (currentPage === 'home') setTimeout(() => initMainCarousel(), 100);
                document.getElementById('matLoginBtn')?.addEventListener('click', async () => { const email = document.getElementById('matEmail').value, pwd = document.getElementById('matPassword').value; try { await signInWithEmailAndPassword(auth, email, pwd); await loadUserSubscription(); renderCurrentView(); } catch(e){ document.getElementById('matMsg').innerText = e.message; } });
                document.getElementById('matRegisterBtn')?.addEventListener('click', async () => { const email = document.getElementById('matEmail').value, pwd = document.getElementById('matPassword').value; try { await createUserWithEmailAndPassword(auth, email, pwd); await loadUserSubscription(); renderCurrentView(); } catch(e){ document.getElementById('matMsg').innerText = e.message; } });
            } else {
                if (mainCarouselInterval) clearInterval(mainCarouselInterval);
                root.innerHTML = renderAdminView();
                if (adminAuthorized) { setTimeout(()=>loadAdminDashboardLogic(),50); document.getElementById('adminLogoutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.reload(); }); document.getElementById('viewMainSiteBtn')?.addEventListener('click', () => { const mainUrl = new URL(window.location.href); mainUrl.searchParams.delete('admin'); window.open(mainUrl.toString(), '_blank'); }); }
                else { attachAdminAuthEvents(); }
            }
        }
        function attachAdminAuthEvents() { document.getElementById('adminLoginBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; try { const cred = await signInWithEmailAndPassword(auth, email, pwd); if(await checkAdminAuthorization(cred.user)) { adminAuthorized=true; renderCurrentView(); } else document.getElementById('adminAuthMsg').innerText="Not admin."; } catch(e){ document.getElementById('adminAuthMsg').innerText=e.message; } }); document.getElementById('adminRegisterBtn')?.addEventListener('click', async () => { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; if(!email||!pwd) return; try { const userCred = await createUserWithEmailAndPassword(auth, email, pwd); const adminDocRef = doc(db,"admin","adminData"); const snap = await getDoc(adminDocRef); if(!snap.exists()) { await setDoc(adminDocRef, { adminUid: userCred.user.uid }); adminAuthorized=true; renderCurrentView(); } else alert("Admin already exists."); } catch(e){ alert(e.message); } }); }

        onAuthStateChanged(auth, async (user) => { currentUser = user; if (user) await loadUserSubscription(); else userSubscription = null; if (currentMode !== 'admin') renderCurrentView(); });

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMode = urlParams.get('admin') === 'true' ? 'admin' : 'user';
            await initRealtimeSync();
            if (currentMode === 'admin') onAuthStateChanged(auth, async (user) => { if (user) adminAuthorized = await checkAdminAuthorization(user); else adminAuthorized = false; renderCurrentView(); });
            else { currentPage = getPageFromHash(); renderCurrentView(); }
            setTimeout(() => { const ld = document.getElementById('loadingScreen'); if(ld) { ld.classList.add('fade-out'); setTimeout(()=>{if(ld&&ld.parentNode) ld.style.display='none';},800); } }, 3000);
        }
        init();
    </script>
